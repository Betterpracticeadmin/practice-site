<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#060607">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Practice">
<link rel="manifest" href="/practice.webmanifest">
<link rel="apple-touch-icon" href="/icon.svg">
<title>Practice · Co-pilote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{--bg:#060607;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.10);--txt:#ECEEF0;--dim:#8b9298;--faint:#565b61;--amber:#E0A33A;--red:#E2554F;--accent:#ECEEF0;--mono:'JetBrains Mono',monospace;}
  html,body{height:100%;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;overflow:hidden;}
  #map{position:fixed;inset:0;z-index:1;background:#08090b;}
  .leaflet-container{background:#08090b;font-family:var(--mono);}
  .leaflet-control-attribution{background:rgba(0,0,0,.55)!important;color:#777!important;font-size:9px!important;}
  .leaflet-control-attribution a{color:#9aa0a6!important;}
  .leaflet-bar a{background:rgba(20,22,26,.92)!important;color:#cfd3d7!important;border-color:rgba(255,255,255,.12)!important;}
  .leaflet-control-zoom{margin-top:80px!important;}

  /* position marker — monochrome, luminous */
  .me-wrap{position:relative;width:20px;height:20px;}
  .me-dot{width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid rgba(255,255,255,.55);box-shadow:0 0 0 7px rgba(255,255,255,.10),0 0 18px rgba(255,255,255,.45);}
  .me-arrow{position:absolute;top:-15px;left:50%;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:13px solid #fff;transform-origin:50% 24px;transform:translateX(-50%);transition:transform .25s;filter:drop-shadow(0 0 4px rgba(255,255,255,.5));}
  .dest-pin{font-size:26px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.85));}

  /* top bar */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;gap:8px;align-items:center;padding:calc(12px + env(safe-area-inset-top)) 14px 10px;}
  .search{flex:1;display:flex;gap:6px;background:var(--card);backdrop-filter:blur(22px);border:.5px solid var(--border);border-radius:16px;padding:6px 6px 6px 16px;align-items:center;box-shadow:0 8px 30px rgba(0,0,0,.5);}
  .search input{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-size:15px;font-family:'Inter';}
  .search input::placeholder{color:var(--faint);}
  .search button{background:#fff;color:#0a0a0a;border:none;border-radius:11px;padding:9px 16px;font-size:11px;font-weight:600;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap;}
  .icon-btn{background:var(--card);backdrop-filter:blur(22px);border:.5px solid var(--border);border-radius:13px;width:44px;height:44px;display:grid;place-items:center;cursor:pointer;font-size:16px;color:var(--dim);flex-shrink:0;box-shadow:0 8px 30px rgba(0,0,0,.4);}
  .icon-btn.on{color:#fff;border-color:rgba(255,255,255,.28);}

  /* suggestions */
  .suggest{position:fixed;left:14px;right:108px;top:calc(62px + env(safe-area-inset-top));z-index:11;display:none;flex-direction:column;background:rgba(13,14,16,.97);backdrop-filter:blur(22px);border:.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 16px 44px rgba(0,0,0,.65);}
  .suggest.show{display:flex;}
  .suggest div{padding:13px 16px;font-size:13.5px;color:var(--txt);cursor:pointer;border-bottom:.5px solid rgba(255,255,255,.06);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .suggest div:last-child{border-bottom:none;}
  .suggest div:hover{background:rgba(255,255,255,.05);}
  .suggest div small{color:var(--dim);}

  /* maneuver banner */
  .navbar{position:fixed;left:14px;right:14px;top:calc(72px + env(safe-area-inset-top));z-index:9;display:none;align-items:center;gap:16px;background:var(--card);backdrop-filter:blur(22px);border:.5px solid var(--border);border-radius:18px;padding:14px 16px;box-shadow:0 10px 34px rgba(0,0,0,.5);}
  .navbar.show{display:flex;}
  .mv-arrow{font-size:30px;line-height:1;color:#fff;flex-shrink:0;width:40px;text-align:center;}
  .mv-main{flex:1;min-width:0;}
  .mv-dist{font-size:24px;font-weight:300;letter-spacing:-.5px;font-family:var(--mono);color:#fff;}
  .mv-street{font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;letter-spacing:.02em;}
  .mv-meta{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:7px;}
  .mv-eta{font-family:var(--mono);font-size:12px;color:var(--txt);}
  .mv-eta b{color:#fff;font-weight:500;}
  .mv-stop{background:rgba(255,255,255,.05);border:.5px solid var(--border);color:var(--dim);border-radius:10px;width:30px;height:28px;cursor:pointer;font-size:13px;}

  /* co-pilot card */
  .copilot{position:fixed;left:14px;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:10;display:flex;align-items:center;gap:16px;background:var(--card);backdrop-filter:blur(26px);border:.5px solid var(--border);border-radius:22px;padding:15px 18px;box-shadow:0 14px 44px rgba(0,0,0,.55);transition:border-color .5s,box-shadow .5s;}
  .copilot.attention{border-color:rgba(224,163,58,.4);}
  .copilot.critical{border-color:rgba(226,85,79,.5);box-shadow:0 0 44px rgba(226,85,79,.18);}
  .cp-main{flex:1;min-width:0;}
  .cp-msg{font-size:16px;font-weight:400;line-height:1.25;color:var(--txt);}
  .cp-sub{font-size:10.5px;color:var(--dim);font-family:var(--mono);margin-top:4px;letter-spacing:.08em;text-transform:uppercase;}
  .cp-speed{text-align:right;flex-shrink:0;}
  .cp-speed .v{font-size:28px;font-weight:200;font-family:var(--mono);letter-spacing:-1px;color:#fff;}
  .cp-speed .u{font-size:9px;color:var(--faint);font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;}

  /* === liquid AI orb === */
  .orb{position:relative;width:42px;height:42px;border-radius:50%;flex-shrink:0;overflow:hidden;background:radial-gradient(circle at 50% 52%,#1a1c20 0%,#070708 78%);box-shadow:inset 0 0 0 .5px rgba(255,255,255,.14),0 0 22px rgba(255,255,255,.08);}
  .orb::before{content:'';position:absolute;inset:-35%;background:conic-gradient(from 0deg,transparent 0deg,rgba(255,255,255,.5) 40deg,transparent 110deg,rgba(255,255,255,.22) 200deg,transparent 250deg,rgba(255,255,255,.55) 320deg,transparent 360deg);filter:blur(5px);animation:orbSpin 9s linear infinite;}
  .orb::after{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 36% 32%,rgba(255,255,255,.55),transparent 44%);}
  @keyframes orbSpin{to{transform:rotate(360deg);}}
  body.attention .orb{box-shadow:inset 0 0 0 .5px rgba(224,163,58,.45),0 0 26px rgba(224,163,58,.32);}
  body.critical .orb{box-shadow:inset 0 0 0 .5px rgba(226,85,79,.55),0 0 30px rgba(226,85,79,.42);}

  /* start gate */
  .gate{position:fixed;inset:0;z-index:30;display:grid;place-items:center;background:radial-gradient(ellipse 90% 80% at 50% 42%,#101113,#060607 78%);text-align:center;padding:24px;}
  .gate-inner{display:flex;flex-direction:column;align-items:center;}
  .gate-orb{width:clamp(190px,46vw,290px);height:clamp(190px,46vw,290px);margin-bottom:30px;}
  .gate .wm{font-family:var(--mono);font-size:13px;letter-spacing:.42em;color:#fff;text-transform:uppercase;}
  .gate .wm-sub{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--faint);text-transform:uppercase;margin-top:8px;}
  .gate p{color:var(--dim);font-size:13.5px;max-width:330px;margin:18px auto 26px;line-height:1.65;}
  .gate .go{background:#fff;color:#0a0a0a;border:none;border-radius:14px;padding:15px 32px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--mono);letter-spacing:.1em;text-transform:uppercase;}
  .gate .demo{display:block;margin:14px auto 0;background:transparent;border:.5px solid var(--border);color:var(--dim);border-radius:12px;padding:11px 24px;font-size:11px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;cursor:pointer;}
  .gate .lang{display:flex;gap:6px;justify-content:center;margin-top:28px;}
  .gate .lang button{background:rgba(255,255,255,.04);border:.5px solid var(--border);color:var(--dim);border-radius:10px;padding:8px 14px;font-family:var(--mono);font-size:11px;cursor:pointer;letter-spacing:.04em;}
  .gate .lang button.on{background:#fff;color:#0a0a0a;font-weight:600;border-color:transparent;}
  .gate small{display:block;margin-top:24px;color:var(--faint);font-size:10.5px;font-family:var(--mono);letter-spacing:.03em;}
  .toast{position:fixed;top:calc(76px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:40;background:rgba(226,85,79,.94);color:#fff;font-size:12.5px;font-family:var(--mono);padding:10px 16px;border-radius:11px;display:none;max-width:90%;text-align:center;}
  .toast.show{display:block;}
</style>
</head>
<body class="safe">
<div id="map"></div>

<div class="topbar">
  <div class="search">
    <input id="dest" type="text" placeholder="Où va-t-on ?" autocomplete="off"/>
    <button id="goBtn">Y aller</button>
  </div>
  <div class="icon-btn on" id="voiceBtn" title="Voix">🔊</div>
  <div class="icon-btn on" id="followBtn" title="Suivre">⊕</div>
</div>

<div class="suggest" id="suggest"></div>

<div class="navbar" id="navbar">
  <div class="mv-arrow" id="mvArrow">↑</div>
  <div class="mv-main">
    <div class="mv-dist" id="mvDist">—</div>
    <div class="mv-street" id="mvStreet"></div>
  </div>
  <div class="mv-meta">
    <div class="mv-eta" id="routeInfo">—</div>
    <button class="mv-stop" id="routeCancel" title="Arrêter">✕</button>
  </div>
</div>

<div class="copilot" id="copilot">
  <div class="orb" id="orb"></div>
  <div class="cp-main">
    <div class="cp-msg" id="cpMsg">Copilote prêt.</div>
    <div class="cp-sub" id="cpSub">Active ta position pour commencer</div>
  </div>
  <div class="cp-speed"><div class="v" id="spd">0</div><div class="u">km/h</div></div>
</div>

<div class="toast" id="toast"></div>

<div class="gate" id="gate">
  <div class="gate-inner">
    <div class="orb gate-orb"></div>
    <div class="wm">Practice OS</div>
    <div class="wm-sub">Co-pilote · live</div>
    <p>Ta position en direct, et un copilote vocal qui te guide sur de vraies routes.</p>
    <button class="go" id="gateGo">Activer ma position</button>
    <button class="demo" id="gateDemo">▶ Voir une démo</button>
    <div class="lang" id="langSeg">
      <button data-lang="fr" class="on">Français</button>
      <button data-lang="en">English</button>
      <button data-lang="ja">日本語</button>
    </div>
    <small>🔒 Ta position reste sur ton appareil. Précis sur téléphone, en HTTPS.</small>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
"use strict";
(function () {
  var $ = function (id) { return document.getElementById(id); };

  /* ---------- i18n ---------- */
  var LANG = 'fr';
  var I18N = {
    fr: {
      code: 'fr-FR', ready: 'Copilote prêt.', go: 'C’est parti. Je te guide.',
      cruising: ['Route dégagée.', 'Tout roule.', 'Je veille.'],
      calc: function (km, min) { return 'Itinéraire calculé. ' + km + ' kilomètres, environ ' + min + ' minutes.'; },
      inDist: function (d, instr) { return 'Dans ' + d + ' mètres, ' + instr + '.'; },
      now: function (instr) { return instr + ' maintenant.'; },
      arrived: 'Tu es arrivé. Bien joué.',
      reroute: 'Recalcul de l’itinéraire…',
      fast: 'Doucement, tu roules vite.', stop: 'On est à l’arrêt.', resume: 'C’est reparti.',
      notFound: 'Adresse introuvable.', netErr: 'Réseau indisponible, réessaie.',
      turns: { left: 'tourne à gauche', right: 'tourne à droite', sleft: 'serre à gauche', sright: 'serre à droite',
        hleft: 'tourne franchement à gauche', hright: 'tourne franchement à droite', straight: 'continue tout droit',
        uturn: 'fais demi-tour', merge: 'insère-toi', roundabout: function (n) { return 'au rond-point, prends la ' + n + 'e sortie'; },
        keepleft: 'garde la gauche', keepright: 'garde la droite', arrive: 'tu es arrivé' }
    },
    en: {
      code: 'en-US', ready: 'Co-pilot ready.', go: 'Let’s go. I’ll guide you.',
      cruising: ['Road is clear.', 'All smooth.', 'I’m watching.'],
      calc: function (km, min) { return 'Route ready. ' + km + ' kilometres, about ' + min + ' minutes.'; },
      inDist: function (d, instr) { return 'In ' + d + ' metres, ' + instr + '.'; },
      now: function (instr) { return instr + ' now.'; },
      arrived: 'You’ve arrived. Well done.',
      reroute: 'Recalculating route…',
      fast: 'Easy, you’re going fast.', stop: 'We’ve stopped.', resume: 'And we’re moving.',
      notFound: 'Address not found.', netErr: 'Network unavailable, try again.',
      turns: { left: 'turn left', right: 'turn right', sleft: 'keep slightly left', sright: 'keep slightly right',
        hleft: 'turn sharp left', hright: 'turn sharp right', straight: 'continue straight',
        uturn: 'make a u-turn', merge: 'merge', roundabout: function (n) { return 'at the roundabout, take exit ' + n; },
        keepleft: 'keep left', keepright: 'keep right', arrive: 'you have arrived' }
    },
    ja: {
      code: 'ja-JP', ready: 'コ・パイロット準備完了。', go: '行きましょう。案内します。',
      cruising: ['道はクリア。', '順調です。', '見ています。'],
      calc: function (km, min) { return 'ルート完成。' + km + 'キロ、約' + min + '分。'; },
      inDist: function (d, instr) { return d + 'メートル先、' + instr + '。'; },
      now: function (instr) { return instr + '、今。'; },
      arrived: '到着しました。お疲れさま。',
      reroute: 'ルート再計算中…',
      fast: '少しスピード出てます。', stop: '停車中。', resume: '再出発。',
      notFound: '住所が見つかりません。', netErr: 'ネットワークエラー、再試行を。',
      turns: { left: '左折', right: '右折', sleft: 'やや左', sright: 'やや右',
        hleft: '鋭く左折', hright: '鋭く右折', straight: '直進',
        uturn: 'Uターン', merge: '合流', roundabout: function (n) { return 'ラウンドアバウトで' + n + '番目の出口'; },
        keepleft: '左へ', keepright: '右へ', arrive: '到着' }
    }
  };
  function T() { return I18N[LANG]; }

  /* ---------- voice: neural TTS (AWS Polly via StreamElements, free / no key) + device fallback ---------- */
  var NEURAL = { fr: 'Celine', en: 'Brian', ja: 'Mizuki' };  // natural Polly voices per language
  var Voice = {
    on: true, engine: 'web', supported: ('speechSynthesis' in window), voice: null,
    busy: false, queue: [], safety: null, audio: null, neuralFails: 0,
    pick: function () {
      if (!this.supported) return; var all = speechSynthesis.getVoices() || []; var base = T().code.slice(0, 2);
      var m = all.filter(function (v) { return (v.lang || '').toLowerCase().indexOf(base) === 0; });
      m.sort(function (a, b) { return score(b) - score(a); }); this.voice = m[0] || null;
      function score(v) { var n = (v.name + '').toLowerCase(); var s = 0; if (/natural|neural/.test(n)) s += 60; if (/online/.test(n)) s += 30; if (v.localService === false) s += 15; if (/google/.test(n)) s += 25; return s; }
    },
    say: function (text, prio) {
      if (!this.on || !text) return;
      if (this.busy) { if (!this.queue.length) this.queue.push({ t: text, p: prio }); else if (prio > this.queue[0].p) this.queue[0] = { t: text, p: prio }; return; }
      this._speak(text, prio);
    },
    _speak: function (text, prio) {
      this.busy = true; var self = this, called = false;
      var done = function () { if (called) return; called = true; clearTimeout(self.safety); self.busy = false; if (self.queue.length) { var n = self.queue.shift(); self._speak(n.t, n.p); } };
      if (this.engine === 'neural' && this.neuralFails < 3 && navigator.onLine !== false) {
        try {
          var v = NEURAL[LANG] || 'Brian', a = new Audio(); this.audio = a;
          a.src = 'https://api.streamelements.com/kappa/v2/speech?voice=' + encodeURIComponent(v) + '&text=' + encodeURIComponent(text.slice(0, 280));
          a.onended = done;
          a.onerror = function () { self.neuralFails++; self._speakWeb(text, done); };
          clearTimeout(this.safety); this.safety = setTimeout(done, 9000);
          a.play().then(function () { self.neuralFails = 0; }).catch(function () { self.neuralFails++; self._speakWeb(text, done); });
          return;
        } catch (e) {}
      }
      this._speakWeb(text, done);
    },
    _speakWeb: function (text, done) {
      if (!this.supported) { setTimeout(done, 350); return; }
      var u = new SpeechSynthesisUtterance(text);
      if (this.voice) { u.voice = this.voice; u.lang = this.voice.lang; } else u.lang = T().code;
      u.rate = 0.98 + (Math.random() * 0.03 - 0.015); u.pitch = 1.0;
      u.onend = done; u.onerror = done; clearTimeout(this.safety); this.safety = setTimeout(done, 1400 + text.length * 80);
      try { speechSynthesis.speak(u); } catch (e) { done(); }
    },
    flush: function () { this.queue = []; this.busy = false; clearTimeout(this.safety); try { if (this.audio) { this.audio.pause(); this.audio = null; } } catch (e) {} if (this.supported) speechSynthesis.cancel(); }
  };
  if (Voice.supported) { speechSynthesis.onvoiceschanged = function () { Voice.pick(); }; }

  /* ---------- map ---------- */
  var map, meMarker, accCircle, routeLine, destMarker;
  var follow = true, watchId = null, demoTimer = null;
  var pts = [], totalDist = 0, route = null, stepIdx = 0, stepAnnounced = false, lastSpeedState = null, navActive = false;
  var currentDest = null, offCount = 0, rerouting = false, wakeLock = null, suggTimer = null, stepMinD = Infinity;

  function initMap() {
    map = L.map('map', { zoomControl: true, attributionControl: true }).setView([46.6, 2.4], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20, subdomains: 'abcd', attribution: '&copy; OpenStreetMap &copy; CARTO' }).addTo(map);
    routeLine = L.polyline([], { color: '#ffffff', weight: 6, opacity: .92, lineJoin: 'round' }).addTo(map);
    accCircle = L.circle([46.6, 2.4], { radius: 0, color: '#ffffff', weight: 1, opacity: .3, fillColor: '#ffffff', fillOpacity: .05 }).addTo(map);
    var icon = L.divIcon({ className: '', html: '<div class="me-wrap"><div class="me-arrow" id="meArrow"></div><div class="me-dot"></div></div>', iconSize: [20, 20], iconAnchor: [10, 10] });
    meMarker = L.marker([46.6, 2.4], { icon: icon, interactive: false }).addTo(map); meMarker.setOpacity(0);
    map.on('dragstart', function () { follow = false; $('followBtn').classList.remove('on'); hideSuggest(); });
    setTimeout(function () { map.invalidateSize(); }, 200);
    window.addEventListener('resize', function () { map.invalidateSize(); });
  }

  function haversine(a, b) { var R = 6371000, r = Math.PI / 180; var dLat = (b.lat - a.lat) * r, dLon = (b.lon - a.lon) * r; var s = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(a.lat * r) * Math.cos(b.lat * r) * Math.sin(dLon / 2) * Math.sin(dLon / 2); return 2 * R * Math.asin(Math.min(1, Math.sqrt(s))); }

  function setState(s) { document.body.className = s; $('copilot').className = 'copilot ' + (s === 'safe' ? '' : s); }
  function setMsg(m, sub) { $('cpMsg').textContent = m; if (sub != null) $('cpSub').textContent = sub; }
  function toast(m) { var t = $('toast'); if (!m) { t.className = 'toast'; return; } t.textContent = m; t.className = 'toast show'; setTimeout(function () { t.className = 'toast'; }, 3500); }

  /* ---------- position handling ---------- */
  function onPos(c, ts) {
    var lat = c.latitude, lon = c.longitude;
    var last = pts.length ? pts[pts.length - 1] : null;
    var moved = last ? haversine(last, { lat: lat, lon: lon }) : 0;
    if (!last || moved >= 1.0) { if (last) totalDist += moved; pts.push({ lat: lat, lon: lon, t: ts }); if (pts.length > 9000) pts.shift(); }
    meMarker.setLatLng([lat, lon]).setOpacity(1);
    accCircle.setLatLng([lat, lon]).setRadius(c.accuracy || 0);
    if (follow) map.setView([lat, lon], Math.max(map.getZoom(), 16), { animate: true });

    var spd = c.speed; if (spd == null || isNaN(spd)) { if (last) { var dt = (ts - last.t) / 1000; spd = dt > 0 ? moved / dt : 0; } else spd = 0; }
    var spdK = Math.max(0, spd * 3.6);
    var hdg = c.heading; if ((hdg == null || isNaN(hdg)) && last && moved > 0.5) { var dy = lat - last.lat, dx = (lon - last.lon) * Math.cos(lat * Math.PI / 180); hdg = (Math.atan2(dx, dy) * 180 / Math.PI + 360) % 360; }
    $('spd').textContent = spdK.toFixed(0);
    var arrow = $('meArrow'); if (arrow && hdg != null && !isNaN(hdg)) arrow.style.transform = 'translateX(-50%) rotate(' + hdg + 'deg)';

    if (navActive && route) navigate({ lat: lat, lon: lon }, spdK);
    else reactive(spdK);
  }

  /* ---------- reactive co-pilot (no destination) ---------- */
  var lastCruise = 0;
  function reactive(spdK) {
    if (spdK < 2) { if (lastSpeedState !== 'stop') { lastSpeedState = 'stop'; setState('safe'); setMsg(T().stop, ''); Voice.say(T().stop, 1); } return; }
    if (lastSpeedState === 'stop') { Voice.say(T().resume, 1); }
    lastSpeedState = 'move';
    if (spdK > 110) { setState('critical'); setMsg(T().fast, Math.round(spdK) + ' km/h'); var now = Date.now(); if (now - lastCruise > 8000) { lastCruise = now; Voice.say(T().fast, 2); } return; }
    setState('safe');
    var nowt = Date.now();
    if (nowt - lastCruise > 14000) { lastCruise = nowt; var c = T().cruising[Math.floor((nowt / 1000) % T().cruising.length)]; setMsg(c, Math.round(spdK) + ' km/h'); Voice.say(c, 1); }
    else setMsg($('cpMsg').textContent || T().go, Math.round(spdK) + ' km/h');
  }

  /* ---------- turn-by-turn navigation ---------- */
  function maneuverText(step) {
    var m = step.maneuver || {}, mod = m.modifier || '', t = m.type || '', tr = T().turns;
    if (t === 'arrive') return tr.arrive;
    if (t === 'roundabout' || t === 'rotary') return tr.roundabout(m.exit || 1);
    if (t === 'merge') return tr.merge;
    if (t === 'fork') return mod.indexOf('left') >= 0 ? tr.keepleft : tr.keepright;
    if (t === 'end of road' || t === 'turn' || t === 'continue' || t === 'new name' || t === 'on ramp' || t === 'off ramp') {
      if (mod === 'left') return tr.left; if (mod === 'right') return tr.right;
      if (mod === 'slight left') return tr.sleft; if (mod === 'slight right') return tr.sright;
      if (mod === 'sharp left') return tr.hleft; if (mod === 'sharp right') return tr.hright;
      if (mod === 'uturn') return tr.uturn; return tr.straight;
    }
    return tr.straight;
  }
  function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }
  function withStreet(instr, name) { if (!name) return instr; return LANG === 'fr' ? instr + ' sur ' + name : LANG === 'en' ? instr + ' onto ' + name : instr + '、' + name + 'へ'; }
  function arrowGlyph(step) {
    var m = step.maneuver || {}, mod = m.modifier || '', t = m.type || '';
    if (t === 'arrive') return '🏁'; if (t === 'roundabout' || t === 'rotary') return '⟳'; if (t === 'merge') return '⤸';
    if (mod.indexOf('uturn') >= 0) return '⮌';
    if (mod === 'left') return '⬅'; if (mod === 'right') return '➡';
    if (mod === 'slight left') return '↖'; if (mod === 'slight right') return '↗';
    if (mod === 'sharp left') return '⬉'; if (mod === 'sharp right') return '⬈';
    return '⬆';
  }
  function etaText(remM, remMin) {
    var km = (remM / 1000).toFixed(remM < 10000 ? 1 : 0);
    var d = new Date(Date.now() + remMin * 60000);
    var hh = ('0' + d.getHours()).slice(-2), mm = ('0' + d.getMinutes()).slice(-2);
    return '<b>' + km + ' km</b> · ' + hh + ':' + mm;
  }
  function navigate(pos, spdK) {
    setMsg($('cpMsg').textContent, Math.round(spdK) + ' km/h');
    if (!route.coords || !route.coords.length) return;
    // nearest route point (remaining distance + off-route detection)
    var nIdx = 0, nMin = Infinity;
    for (var i = 0; i < route.coords.length; i++) { var c = route.coords[i]; var dd = haversine(pos, { lat: c[1], lon: c[0] }); if (dd < nMin) { nMin = dd; nIdx = i; } }
    if (nMin > 55) { offCount++; if (offCount >= 3 && !rerouting) { offCount = 0; reroute(pos); return; } } else offCount = 0;
    var remM = Math.max(0, route.total - (route.cum[nIdx] || 0));
    var avg = (route.dist > 0 && route.dur > 0) ? route.dist / route.dur : 12;
    var useSpd = spdK > 8 ? spdK / 3.6 : avg;
    var remMin = remM / Math.max(useSpd, 3) / 60;
    $('routeInfo').innerHTML = etaText(remM, remMin);
    if (!route.steps || stepIdx >= route.steps.length) return;
    var step = route.steps[stepIdx], loc = step.maneuver.location;
    var d = haversine(pos, { lat: loc[1], lon: loc[0] });
    if (stepIdx === route.steps.length - 1 && (d < 30 || remM < 25)) { setState('safe'); $('navbar').classList.remove('show'); setMsg(T().arrived, ''); Voice.say(T().arrived, 2); releaseWake(); stopNav(); return; }
    var instr = maneuverText(step), name = (step.name && step.name.length) ? step.name : '';
    stepMinD = Math.min(stepMinD, d);
    $('mvArrow').textContent = arrowGlyph(step);
    $('mvDist').textContent = d < 1000 ? Math.max(0, Math.round(d / 10) * 10) + ' m' : (d / 1000).toFixed(1) + ' km';
    $('mvStreet').textContent = cap(instr) + (name ? ' · ' + name : '');
    if (!stepAnnounced && d < 230) { stepAnnounced = true; setState('attention'); var rd = Math.max(20, Math.round(d / 20) * 20); setMsg(cap(instr), 'dans ' + rd + ' m'); Voice.say(T().inDist(rd, withStreet(instr, name)), 2); }
    // advance once the maneuver is passed (close OR we got close then started moving away — robust to coarse GPS)
    if (d < 38 || (stepMinD < 70 && d > stepMinD + 25)) { stepIdx++; stepAnnounced = false; stepMinD = Infinity; setState('safe'); }
  }

  /* ---------- route data + reroute + wake lock ---------- */
  function setRouteData(rt) {
    route = rt; stepIdx = 0; stepAnnounced = false; navActive = true; offCount = 0; stepMinD = Infinity;
    rt.cum = [0]; rt.total = 0;
    for (var i = 1; i < rt.coords.length; i++) { var a = rt.coords[i - 1], b = rt.coords[i]; rt.total += haversine({ lat: a[1], lon: a[0] }, { lat: b[1], lon: b[0] }); rt.cum[i] = rt.total; }
    routeLine.setLatLngs(rt.coords.map(function (c) { return [c[1], c[0]]; }));
    $('navbar').classList.add('show');
  }
  function reroute(pos) {
    if (!currentDest) return; rerouting = true; setState('attention'); toast(T().reroute); Voice.say(T().reroute, 1);
    getRoute(pos, currentDest).then(function (rt) { rerouting = false; if (rt) { setRouteData(rt); setState('safe'); } }).catch(function () { rerouting = false; });
  }
  function requestWake() { try { if ('wakeLock' in navigator) navigator.wakeLock.request('screen').then(function (w) { wakeLock = w; }).catch(function () {}); } catch (e) {} }
  function releaseWake() { try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) {} }
  document.addEventListener('visibilitychange', function () { if (document.visibilityState === 'visible' && navActive) requestWake(); });

  /* ---------- routing (OSRM) + geocoding (Nominatim) — free, no key ---------- */
  // fetch with timeout + one retry (the free OSRM/Nominatim demo servers can be slow/flaky on a cold call)
  function fetchJSON(url, opts, tries) {
    tries = tries == null ? 2 : tries;
    var ctrl = ('AbortController' in window) ? new AbortController() : null;
    var to = setTimeout(function () { if (ctrl) ctrl.abort(); }, 8000);
    var o = opts || {}; if (ctrl) o.signal = ctrl.signal;
    return fetch(url, o).then(function (r) { clearTimeout(to); if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
      .catch(function (e) { clearTimeout(to); if (tries > 1) return new Promise(function (res) { setTimeout(res, 700); }).then(function () { return fetchJSON(url, opts, tries - 1); }); throw e; });
  }
  function geocode(q) {
    return fetchJSON('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(q), { headers: { 'Accept': 'application/json' } })
      .then(function (a) { return a && a[0] ? { lat: +a[0].lat, lon: +a[0].lon, name: a[0].display_name } : null; });
  }
  function hideSuggest() { var s = $('suggest'); s.className = 'suggest'; s.innerHTML = ''; }
  function searchSuggest(q) {
    if (q.length < 3) { hideSuggest(); return; }
    fetchJSON('https://nominatim.openstreetmap.org/search?format=json&limit=5&q=' + encodeURIComponent(q), { headers: { 'Accept': 'application/json' } })
      .then(function (a) {
        var box = $('suggest'); box.innerHTML = '';
        if (!a || !a.length) { hideSuggest(); return; }
        a.slice(0, 5).forEach(function (r) {
          var div = document.createElement('div'); var parts = (r.display_name || '').split(',');
          div.innerHTML = parts[0] + (parts.length > 1 ? ' <small>' + parts.slice(1, 3).join(',') + '</small>' : '');
          div.addEventListener('mousedown', function (e) { e.preventDefault(); $('dest').value = parts[0]; hideSuggest(); startRouteTo({ lat: +r.lat, lon: +r.lon, name: r.display_name }); });
          box.appendChild(div);
        });
        box.className = 'suggest show';
      }).catch(function () { hideSuggest(); });
  }
  function getRoute(from, to) {
    var u = 'https://router.project-osrm.org/route/v1/driving/' + from.lon + ',' + from.lat + ';' + to.lon + ',' + to.lat + '?overview=full&geometries=geojson&steps=true';
    return fetchJSON(u).then(function (j) {
      if (!j.routes || !j.routes.length) return null; var rt = j.routes[0];
      var steps = []; (rt.legs || []).forEach(function (leg) { (leg.steps || []).forEach(function (s) { steps.push(s); }); });
      return { coords: rt.geometry.coordinates, dist: rt.distance, dur: rt.duration, steps: steps };
    });
  }
  function startRouteTo(to) {
    var from = pts.length ? pts[pts.length - 1] : null;
    if (!from) { toast('Active d’abord ta position.'); return; }
    currentDest = to; hideSuggest(); setMsg(T().reroute, ''); requestWake();
    getRoute(from, to).then(function (rt) {
      if (!rt) { toast(T().netErr); setMsg(T().ready, ''); return; }
      setRouteData(rt);
      if (destMarker) map.removeLayer(destMarker);
      destMarker = L.marker([to.lat, to.lon], { icon: L.divIcon({ className: '', html: '<div class="dest-pin">📍</div>', iconSize: [26, 26], iconAnchor: [13, 26] }) }).addTo(map);
      try { map.fitBounds(routeLine.getBounds().pad(0.2)); } catch (e) {}
      follow = true; $('followBtn').classList.add('on');
      var km = (rt.dist / 1000).toFixed(1), min = Math.round(rt.dur / 60);
      $('routeInfo').innerHTML = '<b>' + km + ' km</b> · ' + min + ' min';
      setState('safe'); setMsg(T().go, km + ' km · ' + min + ' min'); Voice.say(T().calc(km, min), 2);
    }).catch(function () { toast(T().netErr); setMsg(T().ready, ''); });
  }
  function stopNav() { navActive = false; route = null; currentDest = null; routeLine.setLatLngs([]); if (destMarker) { map.removeLayer(destMarker); destMarker = null; } $('navbar').classList.remove('show'); releaseWake(); }

  /* ---------- geolocation ---------- */
  function startGeo() {
    if (!('geolocation' in navigator)) { toast('Géolocalisation non supportée.'); return; }
    if (!window.isSecureContext) toast('⚠ Ouvre la page en HTTPS (téléphone) pour un GPS précis.');
    hideGate(); follow = true; $('followBtn').classList.add('on'); requestWake();
    setMsg(T().ready, ''); Voice.pick();
    if (watchId != null) navigator.geolocation.clearWatch(watchId);
    watchId = navigator.geolocation.watchPosition(
      function (p) { onPos(p.coords, Date.now()); },
      function (err) { toast(err.code === 1 ? 'Localisation refusée.' : err.code === 2 ? 'Position indisponible (extérieur ?).' : 'Délai dépassé.'); },
      { enableHighAccuracy: true, maximumAge: 1000, timeout: 12000 });
  }

  /* ---------- DEMO: real route + drive along it ---------- */
  function startDemo() {
    hideGate(); Voice.pick();
    var from = { lat: 48.8584, lon: 2.2945 }, to = { lat: 48.8738, lon: 2.2950 }; // Eiffel -> Arc de Triomphe area
    pts = [from]; meMarker.setLatLng([from.lat, from.lon]).setOpacity(1); map.setView([from.lat, from.lon], 15);
    setMsg(T().reroute, 'démo');
    getRoute(from, to).then(function (rt) {
      if (!rt) { toast(T().netErr); setMsg(T().ready, ''); return; }
      currentDest = to; setRouteData(rt);
      destMarker = L.marker([to.lat, to.lon], { icon: L.divIcon({ className: '', html: '<div class="dest-pin">📍</div>', iconSize: [26, 26], iconAnchor: [13, 26] }) }).addTo(map);
      var km = (rt.dist / 1000).toFixed(1), min = Math.round(rt.dur / 60);
      $('routeInfo').innerHTML = '<b>' + km + ' km</b> · ' + min + ' min (démo)';
      Voice.say(T().calc(km, min), 2); follow = true; $('followBtn').classList.add('on');
      var coords = rt.coords, i = 0;
      demoTimer = setInterval(function () {
        if (i >= coords.length) { clearInterval(demoTimer); demoTimer = null; return; }
        var c = coords[i], prev = coords[Math.max(0, i - 1)];
        var hdg = null; if (i > 0) { var dy = c[1] - prev[1], dx = (c[0] - prev[0]) * Math.cos(c[1] * Math.PI / 180); hdg = (Math.atan2(dx, dy) * 180 / Math.PI + 360) % 360; }
        onPos({ latitude: c[1], longitude: c[0], accuracy: 5, speed: 13, heading: hdg }, Date.now());
        i += 2;
      }, 180);
    }).catch(function () { toast(T().netErr); setMsg(T().ready, ''); });
  }

  function hideGate() { $('gate').style.display = 'none'; }

  /* ---------- controls ---------- */
  $('gateGo').addEventListener('click', startGeo);
  $('gateDemo').addEventListener('click', startDemo);
  $('langSeg').addEventListener('click', function (e) { var b = e.target.closest('button'); if (!b) return; [].forEach.call(this.children, function (x) { x.classList.toggle('on', x === b); }); LANG = b.dataset.lang; Voice.pick(); });
  $('goBtn').addEventListener('click', function () { var q = $('dest').value.trim(); if (!q) return; hideSuggest(); setMsg(T().reroute, ''); geocode(q).then(function (d) { if (!d) { toast(T().notFound); return; } startRouteTo(d); }).catch(function () { toast(T().netErr); setMsg(T().ready, ''); }); });
  $('dest').addEventListener('keydown', function (e) { if (e.key === 'Enter') { hideSuggest(); $('goBtn').click(); } });
  $('dest').addEventListener('input', function () { var q = this.value.trim(); clearTimeout(suggTimer); suggTimer = setTimeout(function () { searchSuggest(q); }, 350); });
  $('dest').addEventListener('blur', function () { setTimeout(hideSuggest, 180); });
  $('routeCancel').addEventListener('click', function () { if (demoTimer) { clearInterval(demoTimer); demoTimer = null; } stopNav(); setMsg(T().ready, ''); });
  $('voiceBtn').addEventListener('click', function () { Voice.on = !Voice.on; this.classList.toggle('on', Voice.on); this.textContent = Voice.on ? '🔊' : '🔈'; if (!Voice.on) Voice.flush(); });
  $('followBtn').addEventListener('click', function () { follow = !follow; this.classList.toggle('on', follow); });

  if (window.L) initMap(); else toast('La carte n’a pas pu se charger.');
  if (/[?&]demo/.test(location.search)) setTimeout(function () { $('gateDemo').click(); }, 700);
})();
</script>
</body>
</html>
