<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05070f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  #map{position:absolute;inset:0;z-index:0;background:#0a0d14;}
  /* MapLibre attribution discrete et coin bas-droit decale au-dessus du cockpit */
  .maplibregl-ctrl-attrib{font-size:9px!important;background:rgba(6,8,14,.45)!important;color:#7a808c!important;}
  .maplibregl-ctrl-attrib a{color:#9aa3b2!important;}
  .maplibregl-ctrl-bottom-right{z-index:9!important;}
  .maplibregl-ctrl-bottom-left{display:none!important;} /* logo non requis */

  /* message d'erreur discret (echec tuiles) */
  #map-err{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:8;
    display:none;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;
    color:#f5a623;background:rgba(8,10,14,.78);border:.5px solid rgba(245,166,35,.4);
    border-radius:10px;padding:6px 12px;pointer-events:none;text-transform:uppercase;}
  #vig{position:fixed;inset:0;pointer-events:none;z-index:3;
       box-shadow:inset 0 0 200px 40px rgba(0,0,0,.40);}
</style>

<style>
/* ===================== PRACTICE COCKPIT OVERLAY — STYLE ===================== */
#cockpit{
  --acc:#FF5000; --mono:'JetBrains Mono',monospace;
  --safe:#39d98a; --alert:#f5a623; --crit:#ff3b46;
  --txt:#F2F3F5; --faint:#6c727a;
  position:absolute; inset:0; z-index:10;
  font-family:'Inter',sans-serif; color:var(--txt);
  pointer-events:none;
  -webkit-user-select:none; user-select:none;
}
#cockpit .ck-panel,
#cockpit #ck-burger,
#cockpit #ck-ctl,
#cockpit #ck-miniMap{ pointer-events:auto; }

#cockpit, #cockpit *{ box-sizing:border-box; margin:0; }
/* NOTE : on ne remet PAS 'padding:0' ici -> sinon ca ecrase (specificite #cockpit *)
   le padding de .ck-panel et le texte colle aux bords (infos qui "depassent" du cadre).
   Les boutons gardent leur propre padding (regles #id dediees). */

#ck-warm{position:absolute;inset:0;pointer-events:none;z-index:1;opacity:.35;background:
  radial-gradient(130% 90% at 50% 22%, rgba(255,80,0,.16), transparent 58%),
  radial-gradient(90% 70% at 10% 96%, rgba(150,28,72,.14), transparent 55%),
  radial-gradient(90% 70% at 92% 92%, rgba(120,30,90,.12), transparent 55%);}
#ck-vig{position:absolute;inset:0;pointer-events:none;z-index:2;
  box-shadow:inset 0 0 220px -40px var(--lvl,transparent);transition:box-shadow .5s;}
#cockpit[data-lvl="ALERT"] #ck-vig{--lvl:rgba(245,166,35,.45);}
#cockpit[data-lvl="CRITICAL"] #ck-vig{animation:ck-pulse 1s ease-in-out infinite;}
@keyframes ck-pulse{0%,100%{box-shadow:inset 0 0 200px -50px rgba(255,59,70,.5)}
  50%{box-shadow:inset 0 0 260px -20px rgba(255,59,70,.85)}}

.ck-panel{position:absolute;z-index:5;
  background:
    linear-gradient(135deg, rgba(255,80,0,.14), rgba(120,28,62,.06) 55%, rgba(30,12,22,.12)),
    rgba(16,11,14,.42);
  backdrop-filter:blur(28px) saturate(1.3);-webkit-backdrop-filter:blur(28px) saturate(1.3);
  border:.5px solid rgba(255,255,255,.14);border-radius:20px;padding:14px 16px;
  box-shadow:0 18px 55px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.07);}
.ck-lbl{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);}
.ck-ttl{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:#565b61;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.ck-ttl b{color:var(--acc);}
.ck-v{font-family:var(--mono);font-size:12px;}
.ck-trow{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-size:12px;}
.ck-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;
  letter-spacing:.1em;padding:4px 9px;border-radius:20px;border:.5px solid rgba(255,255,255,.14);}
.ck-dot{width:7px;height:7px;border-radius:50%;background:var(--safe);box-shadow:0 0 8px currentColor;color:var(--safe);}

#ck-tele{top:calc(16px + env(safe-area-inset-top));left:calc(16px + env(safe-area-inset-left));width:215px;}
.ck-big{font-size:46px;font-weight:200;letter-spacing:-2px;line-height:1;font-family:var(--mono);}
.ck-big small{font-size:13px;color:#8b9298;letter-spacing:0;margin-left:6px;}
/* en mode embarque (iframe os.html), on decale les overlays du haut pour ne pas
   passer sous le bouton "Cockpit"/fermeture de l'hote (haut-droit + haut-centre) */
html.embedded #ck-tele{top:calc(60px + env(safe-area-inset-top));}
html.embedded #ck-burger{top:calc(58px + env(safe-area-inset-top));}
html.embedded #ck-ctl{top:calc(100px + env(safe-area-inset-top));}
html.embedded #ck-live{top:calc(64px + env(safe-area-inset-top));}
html.embedded #ck-navAmp{top:104px;}
html.embedded #ck-navMan{top:146px;}

#ck-mapPanel{bottom:calc(16px + env(safe-area-inset-bottom));right:calc(16px + env(safe-area-inset-right));width:230px;padding:12px 13px;}
#ck-miniMap{width:100%;height:150px;border-radius:12px;margin-top:9px;background:#0a0c10;overflow:hidden;position:relative;}
#ck-mapFallback{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);
  font-size:9px;letter-spacing:.16em;color:#565b61;text-align:center;
  background:repeating-linear-gradient(45deg,#0a0c10 0 12px,#0d1015 12px 24px);}
.ck-me-dot{width:14px;height:14px;border-radius:50%;background:var(--acc);
  box-shadow:0 0 0 4px rgba(255,80,0,.25),0 0 12px var(--acc);}
#cockpit[data-map="off"] #ck-mapPanel{display:none;}

#ck-burger{position:absolute;top:calc(16px + env(safe-area-inset-top));right:calc(16px + env(safe-area-inset-right));
  z-index:33;pointer-events:auto;background:rgba(8,10,14,.72);border:.5px solid rgba(255,255,255,.18);
  color:var(--txt);border-radius:12px;padding:9px 14px;font-size:12.5px;cursor:pointer;
  font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);display:flex;align-items:center;gap:9px;}
#ck-burger:hover{border-color:var(--acc);}
#ck-burger.on{border-color:var(--acc);color:var(--acc);}
#ck-burger .bi{display:inline-flex;flex-direction:column;gap:2.5px;}
#ck-burger .bi i{width:15px;height:1.6px;background:currentColor;border-radius:2px;}
#ck-ctl{top:calc(58px + env(safe-area-inset-top));right:calc(16px + env(safe-area-inset-right));
  z-index:32;display:none;flex-direction:column;gap:7px;align-items:stretch;padding:12px;width:218px;
  max-height:calc(100vh - 96px);overflow-y:auto;scrollbar-width:none;}
#ck-ctl.open{display:flex;}
#ck-ctl::-webkit-scrollbar{display:none;}
#ck-ctl button{background:rgba(255,255,255,.06);border:.5px solid rgba(255,255,255,.14);color:var(--txt);
  border-radius:11px;padding:9px 13px;font-size:12px;cursor:pointer;font-family:'Inter';
  transition:.15s;white-space:nowrap;text-align:left;}
#ck-ctl button:hover{border-color:var(--acc);}
#ck-ctl button.on{background:var(--acc);color:#000;border-color:var(--acc);font-weight:600;}
#ck-ctl .ck-sep{height:1px;background:rgba(255,255,255,.12);margin:4px 2px;}

#ck-live{position:absolute;top:calc(34px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  z-index:42;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.2em;
  padding:5px 13px;border-radius:20px;border:.5px solid rgba(255,255,255,.16);background:rgba(0,0,0,.5);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);pointer-events:none;
  transition:color .3s,border-color .3s,box-shadow .3s;}
#ck-live.live{color:var(--safe);border-color:rgba(57,217,138,.55);box-shadow:0 0 16px -4px rgba(57,217,138,.6);}
#ck-live.demo{color:var(--alert);border-color:rgba(245,166,35,.5);}

#ck-navAmp{position:absolute;top:62px;left:50%;transform:translateX(-50%);z-index:13;
  display:flex;align-items:center;gap:10px;pointer-events:none;font-family:var(--mono);}
#ck-navAmp>div{background:rgba(12,14,18,.62);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:.5px solid rgba(255,255,255,.12);border-radius:12px;padding:5px 10px;
  display:flex;align-items:center;gap:7px;box-shadow:0 6px 18px rgba(0,0,0,.3);}
.na-lim b{display:grid;place-items:center;width:30px;height:30px;border-radius:50%;
  background:#fff;color:#c0202a;border:2.5px solid #d11a25;font-size:14px;font-weight:800;}
.na-eta b{font-size:14px;color:var(--txt);} .na-eta span{font-size:11px;color:#8b9298;margin-left:6px;}

#ck-navMan{position:absolute;top:104px;left:50%;transform:translateX(-50%);z-index:13;
  display:none;align-items:center;gap:12px;background:rgba(12,14,18,.66);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:.5px solid rgba(255,255,255,.14);
  border-radius:16px;padding:9px 16px;box-shadow:0 8px 24px rgba(0,0,0,.34);
  pointer-events:none;font-family:var(--mono);}
#ck-navMan.show{display:flex;}
#ck-navMan .nm-arrow{color:var(--acc);display:flex;align-items:center;}
#ck-navMan .nm-txt{display:flex;flex-direction:column;line-height:1.12;}
#ck-navMan .nm-txt b{font-size:22px;color:#fff;}
#ck-navMan .nm-txt span{font-size:12px;color:#9aa3b2;max-width:200px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}

#ck-raceHud{position:absolute;left:calc(16px + env(safe-area-inset-left));bottom:calc(16px + env(safe-area-inset-bottom));
  z-index:6;display:flex;align-items:center;gap:14px;width:215px;padding:11px 12px;border-radius:16px;
  background:rgba(8,10,14,.62);border:.5px solid rgba(255,255,255,.1);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);font-family:var(--mono);
  box-shadow:0 14px 44px -18px rgba(0,0,0,.75);pointer-events:none;}
#ck-raceHud .rh-lab{display:block;font-size:7px;letter-spacing:.16em;color:#7a808c;
  text-transform:uppercase;margin-bottom:3px;text-align:center;}
#ck-raceHud .rh-gear b{font-size:34px;font-weight:700;color:#fff;line-height:1;display:block;text-align:center;}
#ck-raceHud .rh-rpm{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;}
#ck-raceHud .rh-shift{display:flex;gap:3px;}
#ck-raceHud .rh-seg{width:8px;height:14px;border-radius:2px;background:rgba(255,255,255,.09);}
#ck-raceHud .rh-seg.on.g{background:var(--safe);box-shadow:0 0 6px var(--safe);}
#ck-raceHud .rh-seg.on.y{background:#f5d020;box-shadow:0 0 6px #f5d020;}
#ck-raceHud .rh-seg.on.r{background:var(--crit);box-shadow:0 0 7px var(--crit);}
#ck-raceHud .rh-seg.bl{animation:ck-blink .12s steps(1) infinite;}
@keyframes ck-blink{0%{opacity:1}50%{opacity:.2}}
#ck-raceHud .rh-rpmrow{display:flex;align-items:baseline;gap:4px;}
#ck-raceHud .rh-rpmv{font-size:17px;color:#fff;font-weight:600;}
#ck-raceHud .rh-unit{font-size:8px;color:#7a808c;}

/* ---- BOUTON RECENTRER (mode libre) ---- */
#ck-recenter{
  position:absolute; z-index:30; pointer-events:auto;
  left:50%; bottom:calc(20px + env(safe-area-inset-bottom));
  transform:translate(-50%, 14px) scale(.94);
  display:flex; align-items:center; gap:8px;
  font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase;
  color:var(--txt); cursor:pointer;
  padding:9px 16px; border-radius:24px;
  border:.5px solid rgba(255,255,255,.16);
  background:linear-gradient(135deg, rgba(255,80,0,.14), rgba(120,28,62,.06) 55%, rgba(30,12,22,.12)), rgba(12,10,14,.55);
  -webkit-backdrop-filter:blur(22px) saturate(1.3); backdrop-filter:blur(22px) saturate(1.3);
  box-shadow:0 14px 40px -16px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.07);
  opacity:0; visibility:hidden;
  transition:opacity .35s ease, transform .35s ease, border-color .2s, color .2s;
}
#ck-recenter.show{ opacity:1; visibility:visible; transform:translate(-50%,0) scale(1); }
#ck-recenter:hover{ border-color:var(--acc); color:var(--acc); }
#ck-recenter svg{ color:var(--acc); }
@media(prefers-reduced-motion:reduce){ #ck-recenter{ transition:opacity .2s; } }

@media(max-width:1024px){
  #ck-tele,#ck-mapPanel{width:185px;} #ck-miniMap{height:118px;} .ck-big{font-size:40px;}
}
@media(max-width:760px){
  .ck-panel{padding:10px 11px;border-radius:14px;}
  #ck-tele{top:calc(42px + env(safe-area-inset-top));left:8px;width:40vw;max-width:175px;}
  #ck-mapPanel{top:calc(42px + env(safe-area-inset-top));right:8px;bottom:auto;width:40vw;max-width:175px;}
  #ck-miniMap{height:88px;margin-top:7px;}
  .ck-big{font-size:28px;}
  #ck-navAmp{top:46px;gap:6px;transform:translateX(-50%) scale(.9);}
  #ck-navMan{top:82px;padding:7px 12px;gap:8px;} #ck-navMan .nm-txt b{font-size:18px;}
  #ck-ctl{top:calc(56px + env(safe-area-inset-top));right:8px;width:min(82vw,232px);border-radius:18px;}
  #ck-raceHud{width:168px;bottom:calc(14px + env(safe-area-inset-bottom));}
  #ck-raceHud .rh-gear b{font-size:26px;}
  #ck-live{top:calc(12px + env(safe-area-inset-top));font-size:9px;letter-spacing:.1em;padding:4px 9px;}
}
@media(prefers-reduced-motion:reduce){
  #ck-raceHud .rh-seg.bl{animation:none;} #cockpit[data-lvl="CRITICAL"] #ck-vig{animation:none;}
}
/* =================== /PRACTICE COCKPIT OVERLAY — STYLE ==================== */
</style>
</head>

<!-- ============================================================
     MOTEUR CARTE REELLE — MapLibre GL JS + OpenFreeMap (liberty).
     Vraies rues + vrais batiments OSM, camera de conduite.
     ============================================================ -->
<script>
"use strict";
(function(){

/* ---------- Constantes ---------- */
var STYLE_URL = 'https://tiles.openfreemap.org/styles/liberty';
var DEMO_POS  = { lon:2.32114, lat:48.8655 };   // Paris, rives de la Seine (site UNESCO) — demo riche
/* ============================================================
   CAMERA 3D LIBRE "Tesla / AMap" — vue 3e personne basse, JAMAIS plan du dessus.

   GEOMETRIE VOULUE (camera independante, suit le vehicule avec du retard) :
     - camera ~BEHIND_M derriere le vehicule (le long de -cap),
     - ~UP_M au-dessus du sol,
     - visant un point ~AHEAD_M DEVANT la voiture (regard vers l'horizon routier),
     - inclinaison resultante ~PITCH (55-65), FOV ~FOV (55-65),
     - vehicule PETIT (~6-8% de la hauteur ecran), a ~18% depuis le bas, centre,
       ~80% d'ecran = la route devant. Toujours une ligne d'horizon visible.

   LIMITE API (verifie sur maplibre-gl@5.24.0 — d.ts + camera.ts dans C:\tmp) :
     MapLibre N'A PAS setFreeCameraOptions / getFreeCameraOptions / lookAtPoint
     (API Mapbox uniquement). On ne peut donc PAS poser la camera librement.
     => APPROXIMATION : on garde jumpTo(center/bearing/pitch/zoom) MAIS on place
        le 'center' (= pivot d'inclinaison) ~AHEAD_M EN AVANT du vehicule le long
        du cap. Resultat : la voiture descend dans l'ecran (sensation "camera
        derriere le capot, regard vers l'horizon"). Le FOV, LUI, est reglable
        (setVerticalFieldOfView) -> on le fixe a FOV.

   Tout est interpole frame par frame (amorti exp/damping) -> camera independante
   qui suit avec un leger retard, jamais collee, aucune transition instantanee.
   ============================================================ */

/* --- GEOMETRIE CAMERA (metres) — esprit "derriere/au-dessus/regard devant" ---
   Ces metres sont traduits en pitch + zoom + decalage du center (voir plus bas),
   car MapLibre ne place pas la camera librement (cf. LIMITE API ci-dessus). */
var BEHIND_M       = 10;     // camera ~10 m DERRIERE le vehicule (le long de -cap)
var UP_M           = 6;      // camera ~6 m AU-DESSUS du sol
var AHEAD_SLOW     = 6;      // a l'arret/lent : vise pres -> voiture VISIBLE au 1er plan (pas hors-champ)
var AHEAD_FAST     = 16;     // a vitesse : vise plus loin (route devant)

/* --- PITCH / FOV cibles (inclinaison ~60, jamais vertical ni horizontal) --- */
var PITCH          = 60;     // inclinaison camera cible (~atan(AHEAD/UP) ramene en 55-65)
var PITCH_SLOW     = 52;     // basse vitesse : camera basse derriere la voiture (cinematique)
var PITCH_FAST     = 58;     // vitesse elevee : un peu plus rasante (profondeur/vitesse)
var MAX_PITCH      = 70;     // maxPitch a l'init (marge au-dessus de PITCH_FAST, < 85)
var FOV            = 75;     // FOV grand-angle (immersion/vitesse/profondeur max) - setVerticalFieldOfView

/* --- ZOOM DYNAMIQUE selon la vitesse ---
   Recule par rapport a l'ancien reglage : la voiture doit etre PETITE (~6-8% de
   l'ecran). Lent -> un peu plus proche, Rapide -> plus recule (voit + de route). */
var ZOOM_SLOW      = 20.6;   // vitesse faible  : camera QUASI-COLLEE (immersion max), voiture grande
var ZOOM_MID       = 19.6;   // vitesse moyenne : reste tres proche
var ZOOM_FAST      = 18.8;   // vitesse elevee  : recule un peu mais garde l'immersion
var SPD_SLOW       = 15;     // km/h : en dessous = ZOOM_SLOW / PITCH_SLOW
var SPD_MID        = 50;     // km/h : palier intermediaire
var SPD_FAST       = 110;    // km/h : au-dessus = ZOOM_FAST / PITCH_FAST

/* --- CADRAGE : vehicule bas (~18% depuis le bas) ---
   Le decalage AHEAD_M du center fait deja descendre la voiture ; ce padding.top
   complementaire remonte le pivot pour caler la voiture vers ~18% du bas. */
var CAM_PAD_FACTOR = 0.12;   // padding.top : remonte la voiture pour qu'elle reste DANS l'ecran (quart inferieur)

/* --- AMORTI (frame-rate-independant : k = 1 - exp(-RATE*dt)) ---
   Plus le RATE est BAS, plus il y a de lag/inertie (ressenti premium).
   On vise un peu plus de lag qu'avant (position 6.0 -> 4.5, rot 4.5 -> 3.2). */
var DAMP_POS       = 4.5;    // suivi position (lon/lat)
var DAMP_ROT       = 3.2;    // suivi cap (bearing) — plus mou = virages absorbes
var DAMP_ZOOM      = 3.0;    // transition zoom (~equiv. 300-500ms)
var DAMP_PITCH     = 2.6;    // transition pitch (douce)

/* --- ANTICIPATION VIRAGES ---
   Quand une manoeuvre approche (LIVE.navTurn != 0 et LIVE.navDist faible),
   on biaise legerement le cap cible vers le virage pour montrer la route
   qui arrive. Doux, borne, proportionnel a la proximite. */
var TURN_LOOKAHEAD = 120;    // m : distance sous laquelle on commence a anticiper
var TURN_BIAS_MAX  = 12;     // deg : biais maximal de cap (a 0 m de la manoeuvre)

/* --- MODE LIBRE / SUIVI ---
   Quand l'utilisateur manipule la carte (geste -> e.originalEvent), on passe
   en LIBRE : la boucle cesse de piloter la camera. Le bouton RECENTRER
   rebascule en SUIVI. Reprise auto possible apres inactivite (0 = jamais). */
var FREE_AUTO_RESUME = 0;    // ms d'inactivite avant retour auto au suivi (0 = manuel via bouton)

var LIVE_TIMEOUT = 5000;                       // ms sans 'gps' -> retour DEMO

/* ---------- Etat global expose (lu par le cockpit) ---------- */
var HUB3D = window.HUB3D = {
  speedKmh:0, gear:0, gearLabel:'D', rpm:0, rpmNorm:0,
  navDist:-1, navText:'', limit:50, heading:0, live:false,
  eta:null, remaining:null
};

/* ---------- Etat LIVE (messages GPS de os.html) ---------- */
var LIVE = {
  active:false, lastGps:-1e9,
  speedKmh:0, heading:0, lat:null, lon:null, acc:null,
  navOn:false, navDist:0, navText:'', navArrow:'', navTurn:0,
  eta:null, limit:null, routeCoords:null
};

function liveFresh(){ return LIVE.active && (performance.now()-LIVE.lastGps) < LIVE_TIMEOUT; }

function parseDistMeters(distStr, unit){
  var n = parseFloat(distStr);
  if(!isFinite(n)) return 0;
  return (unit === 'km') ? n*1000 : n;
}
function detectTurn(instr, arrow){
  var s = ((instr||'')+' '+(arrow||'')).toLowerCase();
  if(/droite|right|↱|→|➡|▶/.test(s)) return 1;
  if(/gauche|left|↰|←|⬅|◀/.test(s)) return -1;
  return 0;
}

/* ============================================================
   PROTOCOLE GPS — identique a hud3d.html.
   { type:'gps', speed:<m/s>, heading, lat, lon, acc }
   { type:'nav', nav, dist, distUnit, instr, arrow, eta }
   { type:'route', coords:[[lon,lat],...]|null }
   { type:'mode' } ; { type:'northlock' } -> ignore
   ============================================================ */
/* ---- helpers position / cap ---- */
function bearingBetween(la1,lo1,la2,lo2){
  var R=Math.PI/180, p1=la1*R, p2=la2*R, dl=(lo2-lo1)*R;
  var y=Math.sin(dl)*Math.cos(p2);
  var x=Math.cos(p1)*Math.sin(p2)-Math.sin(p1)*Math.cos(p2)*Math.cos(dl);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function distMeters(la1,lo1,la2,lo2){
  var R=6371000, p=Math.PI/180;
  var dphi=(la2-la1)*p, dl=(lo2-lo1)*p;
  var a=Math.sin(dphi/2)*Math.sin(dphi/2)+Math.cos(la1*p)*Math.cos(la2*p)*Math.sin(dl/2)*Math.sin(dl/2);
  return 2*R*Math.asin(Math.min(1,Math.sqrt(a)));
}
/* Avance [lat,lon] de distMeters le long de bearingDeg (0=N, 90=E) -> {lat,lon}.
   Sert a placer le 'center' (pivot d'inclinaison) ~AHEAD_M DEVANT le vehicule :
   c'est l'astuce qui simule la "camera derriere le capot regardant l'horizon",
   faute de setFreeCameraOptions/lookAtPoint en MapLibre. */
function offsetForward(lat, lon, bearingDeg, distM){
  return offsetForwardInto(lat, lon, bearingDeg, distM, { lat:0, lon:0 });
}
/* Variante SANS allocation : ecrit dans 'out' (reutilise dans la boucle frame
   -> 0 objet cree par frame, evite le GC churn). Conversion deg/rad explicite,
   garde-fou cos(lat)~0 (poles) pour ne JAMAIS produire de NaN/Infinity. */
function offsetForwardInto(lat, lon, bearingDeg, distM, out){
  var R=6378137, rad=Math.PI/180, br=bearingDeg*rad;
  var cosLat=Math.cos(lat*rad);
  if(Math.abs(cosLat)<1e-9) cosLat = (cosLat<0?-1:1)*1e-9;   // anti-NaN proche des poles
  var dLatRad=(distM*Math.cos(br))/R;                         // radians
  var dLonRad=(distM*Math.sin(br))/(R*cosLat);               // radians
  out.lat = lat + dLatRad/rad;                                // -> degres
  out.lon = lon + dLonRad/rad;                                // -> degres
  return out;
}
/* alimente LIVE depuis une source de position (postMessage GPS ou geoloc navigateur).
   Si le cap n'est PAS fourni (boussole absente), on le DEDUIT du deplacement ->
   la carte s'oriente toujours dans la direction de marche (route devant = haut). */
function feedPosition(lat,lon,heading,spd){
  var now=performance.now();
  if(typeof lat==='number' && typeof lon==='number' && isFinite(lat) && isFinite(lon)){
    // GARDE ANTI-TELEPORTATION : rejette une position trop eloignee arrivee trop vite
    // (point GPS errone, ou source qui renvoie une vieille position = "position d'hier").
    // Acceptee seulement si confirmee 2x de suite (vrai grand deplacement / reouverture loin).
    if(LIVE.lat!=null){
      var jump=distMeters(LIVE.lat,LIVE.lon,lat,lon), dtSec=Math.max(0.001,(now-LIVE.lastGps)/1000);
      var implKmh=(jump/1000)/(dtSec/3600);   // vitesse impliquee par le saut
      if(jump>300 && implKmh>400 && (LIVE._far||0)<2){ LIVE._far=(LIVE._far||0)+1; LIVE.lastGps=now; LIVE.active=true; return; }  // saut impossible -> rejete (sauf confirme 2x)
      LIVE._far=0;
    }
    if(typeof heading==='number' && !isNaN(heading) && heading>=0){
      LIVE.heading=((heading%360)+360)%360;
    } else if(LIVE.prevLat!=null && distMeters(LIVE.prevLat,LIVE.prevLon,lat,lon)>=3){
      LIVE.heading=bearingBetween(LIVE.prevLat,LIVE.prevLon,lat,lon);
    }
    LIVE.prevLat=lat; LIVE.prevLon=lon;
    LIVE.lat=lat; LIVE.lon=lon;
  }
  if(typeof spd==='number' && !isNaN(spd)) LIVE.speedKmh=Math.max(0,spd*3.6);
  LIVE.lastGps=now; LIVE.active=true;
  if(LIVE.lat!=null && LIVE.lon!=null && window.cockpitSetMapPos) window.cockpitSetMapPos(LIVE.lat,LIVE.lon);
}

window.addEventListener('message', function(e){
  var d = e && e.data;
  if(!d || typeof d!=='object' || !d.type) return;
  try{
    switch(d.type){
      case 'gps': {
        var lim = (typeof d.limit==='number') ? d.limit
                : (typeof d.maxspeed==='number') ? d.maxspeed : null;
        if(lim!=null && isFinite(lim) && lim>0) LIVE.limit = lim;
        if(typeof d.acc==='number') LIVE.acc = d.acc;
        feedPosition(d.lat, d.lon, d.heading, d.speed);   // cap deduit du mouvement si absent
        break;
      }
      case 'nav': {
        LIVE.navOn = !!d.nav;
        if(LIVE.navOn){
          LIVE.navDist = parseDistMeters(d.dist, d.distUnit);
          LIVE.navText = (typeof d.instr==='string' && d.instr) ? d.instr : '';
          LIVE.navArrow= (typeof d.arrow==='string') ? d.arrow : '';
          LIVE.eta     = (typeof d.eta==='string' && d.eta) ? d.eta : null;
          if(typeof d.limit==='number' && isFinite(d.limit) && d.limit>0) LIVE.limit = d.limit;
          LIVE.navTurn = detectTurn(LIVE.navText, LIVE.navArrow);
        } else {
          LIVE.navDist=0; LIVE.navText=''; LIVE.navArrow=''; LIVE.eta=null; LIVE.navTurn=0;
        }
        break;
      }
      case 'route': {
        LIVE.routeCoords = Array.isArray(d.coords) ? d.coords : null;
        applyRoute(LIVE.routeCoords);
        break;
      }
      case 'mode':      { if(typeof d.mode==='string') HUB3D.mode = d.mode; break; }
      case 'northlock':
      default: break;
    }
  }catch(err){ /* jamais lever d'erreur cote hub */ }
}, false);

/* ============================================================
   GEOLOCALISATION REELLE de l'appareil (mode autonome).
   En iframe (os.html) le GPS arrive aussi par postMessage ; les deux
   alimentent LIVE. Demande l'autorisation de localisation au navigateur.
   ============================================================ */
if(navigator.geolocation && navigator.geolocation.watchPosition){
  try{
    navigator.geolocation.watchPosition(function(pos){
      var c=pos && pos.coords; if(!c) return;
      if(typeof c.accuracy==='number') LIVE.acc=c.accuracy;
      feedPosition(c.latitude, c.longitude, c.heading, c.speed);   // cap reel ou deduit du mouvement
    }, function(){ /* refus/erreur loc -> on reste en demo, sans alarme */ },
    { enableHighAccuracy:true, maximumAge:2000, timeout:20000 });
  }catch(e){}
}

try{
  map = new maplibregl.Map({
    container:'map',

    center:[DEMO_POS.lon, DEMO_POS.lat],

    bearing:0,

/* tuiles qui echouent -> message discret, pas d'erreur console bloquante */
var errShown=false;
function showMapErr(msg){
  var el=document.getElementById('map-err');
  if(el){ if(msg) el.textContent=msg; el.style.display='block'; }
  errShown=true;
}
if(map){
  map.on('error', function(ev){
    // ne pas spammer la console ; signaler une seule fois
    if(!errShown) showMapErr('CARTE PARTIELLEMENT INDISPONIBLE');
  });

  /* ---- detection manipulation utilisateur -> MODE LIBRE ----
     movestart couvre pan / zoom / rotate / pitch. e.originalEvent present
     => geste utilisateur (notre jumpTo n'a PAS d'originalEvent). */
  map.on('movestart', function(e){
    if(e && e.originalEvent) enterFreeMode();
  });
  if(FREE_AUTO_RESUME>0){
    map.on('moveend', function(e){
      if(e && e.originalEvent){
        if(freeResumeTimer) clearTimeout(freeResumeTimer);
        freeResumeTimer = setTimeout(recenter, FREE_AUTO_RESUME);
      }
    });
  }
}

/* ---------- Theme sombre premium applique au chargement ---------- */
function darkenBasemap(){
  if(!map) return;
  var layers = map.getStyle().layers || [];
  for(var i=0;i<layers.length;i++){
    var L = layers[i], id=L.id, type=L.type;
    try{
      if(type==='background'){
        map.setPaintProperty(id,'background-color','#0a0d14');
      } else if(type==='fill'){
        // eau / parcs / terrains : teintes sombres
        if(/water|ocean|sea|river/i.test(id)) map.setPaintProperty(id,'fill-color','#0c1828');
        else if(/(park|wood|forest|grass|green|landuse|landcover)/i.test(id)) map.setPaintProperty(id,'fill-color','#10160f');
        else map.setPaintProperty(id,'fill-color','#11151c');
      } else if(type==='line'){
        // routes : gris sombres, hierarchie conservee via largeur d'origine
        if(/motorway|trunk|primary/i.test(id)) map.setPaintProperty(id,'line-color','#3a4150');
        else if(/secondary|tertiary/i.test(id)) map.setPaintProperty(id,'line-color','#2c323d');
        else if(/(rail|transit)/i.test(id)) map.setPaintProperty(id,'line-color','#23272f');
        else map.setPaintProperty(id,'line-color','#222731');
      } else if(type==='symbol'){
        // libelles : clairs et discrets, halo sombre
        if(map.getLayoutProperty(id,'text-field')!==undefined){
          try{ map.setPaintProperty(id,'text-color','#aab2c0'); }catch(_){}
          try{ map.setPaintProperty(id,'text-halo-color','#05070f'); }catch(_){}
          try{ map.setPaintProperty(id,'text-halo-width',1.2); }catch(_){}
        }
      }
    }catch(_){}
  }
}

/* ---------- Batiments 3D (source-layer OpenMapTiles "building") ----------
   Le style OpenFreeMap "liberty" embarque DEJA une couche fill-extrusion
   ("building" / "building-3d"). En ajouter une seconde provoque du z-fighting
   et laisse les batiments d'origine en couleurs "jour". On RESTYLE donc la
   couche existante ; on n'en cree une que si aucune n'est presente. */
var PB_COLOR = [
  'interpolate',['linear'],['get','render_height'],
  0,'#1b2230', 30,'#222b3c', 80,'#2b3850', 180,'#36486a'
];
function styleExtrusion(id){
  try{
    map.setPaintProperty(id,'fill-extrusion-color',PB_COLOR);
    map.setPaintProperty(id,'fill-extrusion-opacity',0.9);
    map.setPaintProperty(id,'fill-extrusion-vertical-gradient',true);
  }catch(_){}
}
function addBuildings3D(){
  if(!map) return;
  var style = map.getStyle();
  var layers = style.layers||[];

  // 1) restyler toute couche fill-extrusion deja fournie par le style
  var found=false;
  for(var i=0;i<layers.length;i++){
    if(layers[i].type==='fill-extrusion'){ styleExtrusion(layers[i].id); found=true; }
  }
  if(found) return;                      // batiments 3D natifs : on s'arrete la

  // 2) aucune couche 3D fournie -> on tente d'en creer une nous-memes
  if(map.getLayer('practice-buildings-3d')) return;
  var srcId = null, sources = style.sources || {};
  for(var s in sources){ if(sources[s] && sources[s].type==='vector'){ srcId = srcId || s; } }
  if(!srcId) return;
  // poser la couche juste avant le premier symbol (sous les libelles)
  var beforeId;
  for(var j=0;j<layers.length;j++){ if(layers[j].type==='symbol'){ beforeId=layers[j].id; break; } }
  try{
    map.addLayer({
      id:'practice-buildings-3d',
      type:'fill-extrusion',
      source:srcId,
      'source-layer':'building',
      minzoom:14,
      filter:['!=',['get','hide_3d'], true],
      paint:{
        'fill-extrusion-color':PB_COLOR,
        'fill-extrusion-height':[
          'interpolate',['linear'],['zoom'],
          14,0, 15.5,['get','render_height']
        ],
        'fill-extrusion-base':['get','render_min_height'],
        'fill-extrusion-opacity':0.9,
        'fill-extrusion-vertical-gradient':true
      }
    }, beforeId);
  }catch(e){ /* schema different : on ignore proprement, la carte 2D reste */ }
}

}

function themeBuildings(night){

/* ---- JOUR/NUIT AUTO selon le vrai lever/coucher du soleil (algorithme sunrise) ---- */
function isDaytime(lat, lon, now){
  var rad=Math.PI/180, deg=180/Math.PI;
  var start=Date.UTC(now.getUTCFullYear(),0,0);
  var day=Math.floor((now-start)/86400000);
  var lngHour=lon/15;
  function ut(rising){
    var t=day+((rising?6:18)-lngHour)/24;
    var M=0.9856*t-3.289;
    var L=M+1.916*Math.sin(M*rad)+0.020*Math.sin(2*M*rad)+282.634; L=((L%360)+360)%360;
    var RA=Math.atan(0.91764*Math.tan(L*rad))*deg; RA=((RA%360)+360)%360;
    RA+=(Math.floor(L/90)*90-Math.floor(RA/90)*90); RA/=15;
    var sinDec=0.39782*Math.sin(L*rad), cosDec=Math.cos(Math.asin(sinDec));
    var cosH=(Math.cos(90.833*rad)-sinDec*Math.sin(lat*rad))/(cosDec*Math.cos(lat*rad));
    if(cosH>1||cosH<-1) return null;   // pas de lever/coucher (zone polaire)
    var H=rising?360-Math.acos(cosH)*deg:Math.acos(cosH)*deg; H/=15;
    var T=H+RA-0.06571*t-6.622;
    var U=T-lngHour; return ((U%24)+24)%24;
  }
  var sr=ut(true), ss=ut(false);
  var nowU=now.getUTCHours()+now.getUTCMinutes()/60+now.getUTCSeconds()/3600;
  if(sr==null||ss==null) return null;
  return (sr<ss) ? (nowU>=sr && nowU<ss) : (nowU>=sr || nowU<ss);
}
var __themeManual=false;   // true si l'utilisateur force le mode via le bouton (desactive l'auto)
function autoTheme(){
  if(__themeManual) return;
  var la=(typeof LIVE!=='undefined'&&LIVE.lat!=null)?LIVE.lat:DEMO_POS.lat;
  var lo=(typeof LIVE!=='undefined'&&LIVE.lon!=null)?LIVE.lon:DEMO_POS.lon;
  var d=isDaytime(la,lo,new Date());
  if(d===null) return;       // zone polaire -> on ne force pas
  applyTheme(!d);            // jour (entre lever et coucher) -> theme jour ; sinon nuit
}
/* le bouton Jour/Nuit passe en MANUEL (desactive l'auto) */
window.addEventListener('cockpit:night', function(e){ __themeManual=true; applyTheme(!!e.detail); });

/* ---------- ROUTES A L'ECHELLE REELLE ----------
   Les largeurs du style sont en PIXELS. On les remplace par une largeur qui suit la VRAIE
   taille au sol (metres) : interpolation exponentielle base 2 -> largeur au sol constante a
   tout zoom (chaque niveau de zoom double les pixels/metre). Largeur deduite de la classe OSM. */
function roadMetersForId(id){
  if(/rail|transit|hatching|waterway/.test(id)) return 0;     // pas une route
  if(/motorway/.test(id)) return /link/.test(id)?7:28;        // autoroute / bretelle
  if(/trunk|primary/.test(id)) return 19;
  if(/secondary|tertiary/.test(id)) return 12;
  if(/minor|street/.test(id)) return 8;                        // residentiel
  if(/service|track/.test(id)) return 4.5;
  if(/path|pedestrian/.test(id)) return 2.5;
  if(/link/.test(id)) return 7;
  return 0;
}
function realRoadWidths(){
  if(!map||!map.getStyle) return;
  var st; try{ st=map.getStyle(); }catch(_){ return; }
  if(!st||!st.layers) return;
  var lat=(map.getCenter&&map.getCenter().lat)||48.8;
  var cos=Math.cos(lat*Math.PI/180)||0.66;
  var ppm14=Math.pow(2,14)/(156543.03*cos), ppm22=Math.pow(2,22)/(156543.03*cos);  // pixels/metre
  var n=0;
  st.layers.forEach(function(L){
    if(L.type!=='line' || L['source-layer']!=='transportation') return;
    var m=roadMetersForId(L.id); if(!m) return;
    if(/casing/.test(L.id)) m*=1.30;                            // lisere (bord de chaussee) un peu plus large
    var expr=['interpolate',['exponential',2],['zoom'],14,+(m*ppm14).toFixed(3),22,+(m*ppm22).toFixed(2)];
    try{ map.setPaintProperty(L.id,'line-width',expr); n++; }catch(_){}
  });
  window.__roadsReal=n;
}

/* ============================================================
   CAMERA DE CONDUITE — suivi lisse.
   IMPORTANT : on NE re-arme PAS un easeTo de 900ms a chaque frame
   (bug connu). On interpole nous-memes l'etat camera (lon/lat/
   bearing) chaque frame et on applique via map.jumpTo (instantane,
   donc pas de file d'animations qui se chevauchent).
   ============================================================ */
var cam = { lon:DEMO_POS.lon, lat:DEMO_POS.lat, bearing:0, zoom:ZOOM_SLOW, pitch:PITCH_SLOW };
var camInit=false, wasLive=false;

/* objets reutilises chaque frame (pas de re-allocation -> evite le GC churn) */
var _jumpOpts = { center:[0,0], bearing:0, zoom:0, pitch:0,
                  padding:{ top:0, bottom:0, left:0, right:0 } };
var _carPos   = window.__carPos = { lon:DEMO_POS.lon, lat:DEMO_POS.lat, bearing:0 };
var _ahead    = { lat:0, lon:0 };   // scratch reutilise par offsetForwardInto (0 alloc/frame)

function lerp(a,b,t){ return a + (b-a)*t; }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function lerpAngle(a,b,t){
  var diff = ((b-a+540)%360)-180;   // plus court chemin
  return (a + diff*t + 360)%360;
}

/* ---- ZOOM/PITCH cibles selon la vitesse (interpolation lineaire par paliers) ---- */
function zoomForSpeed(kmh){
  if(kmh<=SPD_SLOW) return ZOOM_SLOW;
  if(kmh<=SPD_MID)  return lerp(ZOOM_SLOW, ZOOM_MID,  (kmh-SPD_SLOW)/(SPD_MID-SPD_SLOW));
  if(kmh<=SPD_FAST) return lerp(ZOOM_MID,  ZOOM_FAST, (kmh-SPD_MID)/(SPD_FAST-SPD_MID));
  return ZOOM_FAST;
}
function aheadForSpeed(kmh){   // distance du point vise devant : proche a l'arret, loin a vitesse
  if(kmh<=SPD_SLOW) return AHEAD_SLOW;
  if(kmh>=SPD_FAST) return AHEAD_FAST;
  return lerp(AHEAD_SLOW, AHEAD_FAST, (kmh-SPD_SLOW)/(SPD_FAST-SPD_SLOW));
}
function pitchForSpeed(kmh){
  if(kmh<=SPD_SLOW) return PITCH_SLOW;
  if(kmh>=SPD_FAST) return PITCH_FAST;
  return lerp(PITCH_SLOW, PITCH_FAST, (kmh-SPD_SLOW)/(SPD_FAST-SPD_SLOW));
}
/* ---- biais d'anticipation de virage (deg, signe = sens) ---- */
function turnBias(){
  if(!liveFresh() || !LIVE.navOn || !LIVE.navTurn) return 0;
  var d = LIVE.navDist;
  if(!(d>=0) || d>TURN_LOOKAHEAD) return 0;
  var prox = 1 - (d/TURN_LOOKAHEAD);          // 0 (loin) -> 1 (a la manoeuvre)
  return LIVE.navTurn * TURN_BIAS_MAX * prox; // +droite / -gauche
}

/* ============================================================
   MODE SUIVI (defaut) vs LIBRE.
   En LIBRE, la boucle ne pilote plus la camera (jumpTo coupe) pour ne pas
   se battre avec le geste utilisateur. Le bouton RECENTRER repasse en SUIVI.
   Discriminant fiable user vs programme : presence de e.originalEvent.
   ============================================================ */
var followMode = true;          // true = suivi auto camera, false = libre (user)
var freeResumeTimer = null;
function setFollow(on){
  if(followMode===on) return;
  followMode = on;
  var btn = document.getElementById('ck-recenter');
  if(btn) btn.classList.toggle('show', !on);
}
function enterFreeMode(){
  setFollow(false);
  if(freeResumeTimer){ clearTimeout(freeResumeTimer); freeResumeTimer=null; }
}
function recenter(){
  // snap doux : on resynchronise l'etat camera sur la cible courante puis on
  // laisse la boucle reprendre (l'amorti lisse le retour, pas de saut brutal).
  if(map){
    try{
      cam.bearing = map.getBearing();
      cam.zoom = map.getZoom();
      cam.pitch = map.getPitch();
      // map.getCenter() est le pivot PROJETE EN AVANT (AHEAD_M le long du cap).
      // On le ramene sur le vehicule (recul de AHEAD_M) pour que cam.* reste
      // l'etat "vehicule" et eviter une derive vers l'avant a chaque recentrage.
      var c = map.getCenter();
      var back = offsetForward(c.lat, c.lng, cam.bearing, -aheadForSpeed(HUB3D.speedKmh||0));
      cam.lon=back.lon; cam.lat=back.lat;
    }catch(_){}
  }
  if(freeResumeTimer){ clearTimeout(freeResumeTimer); freeResumeTimer=null; }
  setFollow(true);
}
window.__hubRecenter = recenter;

// position cible de conduite : LIVE -> GPS reel ; DEMO -> deplacement anime.
var demoT=0;
function driveTarget(dt){
  // FIX teleportation : une fois qu'on a recu une VRAIE position GPS, on la GARDE
  // (meme si le GPS a un trou > LIVE_TIMEOUT). On NE revient JAMAIS a la position demo
  // Vitry -> sinon la camera teleporte entre ta position reelle et Vitry a chaque coupure.
  if(LIVE.lat!=null && LIVE.lon!=null){
    return { lon:LIVE.lon, lat:LIVE.lat, bearing:LIVE.heading };
  }
  // DEMO : uniquement TANT QU'ON N'A JAMAIS recu de position GPS.
  demoT += dt;                         // (sert juste a la legere oscillation de vitesse demo)
  return { lon:DEMO_POS.lon, lat:DEMO_POS.lat, bearing:0 };
}

var lastTs = performance.now();
var frameStarted=false;
function startFrame(){ if(frameStarted) return; frameStarted=true; lastTs=performance.now(); requestAnimationFrame(frame); }
function frame(ts){
  var dt = Math.min(0.05, (ts-lastTs)/1000); lastTs = ts;

  if(map && mapReady){
    var tgt = driveTarget(dt);
    if(!camInit){
      cam.lon=tgt.lon; cam.lat=tgt.lat; cam.bearing=tgt.bearing;
      cam.zoom=ZOOM_SLOW; cam.pitch=PITCH_SLOW; camInit=true;
    }
    // snap UNE SEULE FOIS, a la toute premiere vraie position GPS (evite un long
    // panoramique depuis Vitry). Ensuite suivi lisse uniquement -> jamais de re-snap
    // sur un trou GPS, donc plus de teleportation.
    if(!wasLive && LIVE.lat!=null && LIVE.lon!=null){ cam.lon=tgt.lon; cam.lat=tgt.lat; cam.bearing=tgt.bearing; wasLive=true; }

    // --- cap cible : cap de marche + biais d'anticipation de virage ---
    var bearingTgt = (tgt.bearing||0) + turnBias();

    // --- cibles zoom/pitch fonction de la vitesse affichee ---
    var spd = HUB3D.speedKmh || 0;
    var zoomTgt  = zoomForSpeed(spd);
    var pitchTgt = opt.view ? pitchForSpeed(spd) : 0;   // vue 2D forcee -> pitch 0

    // --- lissage exponentiel (independant du framerate) : amorti premium ---
    var kPos   = 1 - Math.exp(-DAMP_POS*dt);
    var kRot   = 1 - Math.exp(-DAMP_ROT*dt);
    var kZoom  = 1 - Math.exp(-DAMP_ZOOM*dt);
    var kPitch = 1 - Math.exp(-DAMP_PITCH*dt);
    cam.lon     = lerp(cam.lon, tgt.lon, kPos);
    cam.lat     = lerp(cam.lat, tgt.lat, kPos);
    cam.bearing = lerpAngle(cam.bearing, bearingTgt, kRot);   // suit TOUJOURS le cap (pas de Nord en haut)
    cam.zoom    = lerp(cam.zoom, zoomTgt, kZoom);
    cam.pitch   = clamp(lerp(cam.pitch, pitchTgt, kPitch), 0, MAX_PITCH);

    // En mode SUIVI, on pilote la camera (jumpTo, options reutilisees -> 0 alloc).
    // En mode LIBRE, l'utilisateur a la main : on NE touche PAS la camera.
    // Dans les deux cas on alimente la voiture 3D + le puck sur la position
    // interpolee, et l'etat camera reste synchro pour un recentrage doux.
    if(followMode){
      // CENTER PROJETE EN AVANT : le pivot d'inclinaison est place ~AHEAD_M devant
      // le vehicule (le long du cap lisse). C'est ce qui fait descendre la voiture
      // dans l'ecran (~18% du bas) et donne la sensation "camera derriere/au-dessus
      // regardant l'horizon routier". La voiture 3D, elle, reste sur cam.lon/cam.lat.
      offsetForwardInto(cam.lat, cam.lon, cam.bearing, aheadForSpeed(spd), _ahead);
      _jumpOpts.center[0]=_ahead.lon; _jumpOpts.center[1]=_ahead.lat;
      _jumpOpts.bearing=cam.bearing; _jumpOpts.zoom=cam.zoom; _jumpOpts.pitch=cam.pitch;
      _jumpOpts.padding.top=camPadTop;   // remonte le pivot -> voiture encore plus basse
      map.jumpTo(_jumpOpts);
    }
    _carPos.lon=cam.lon; _carPos.lat=cam.lat; _carPos.bearing=(HUB3D.heading||0);
    addPuck(cam.lon, cam.lat, HUB3D.heading);
  }

  updateState(dt);
  if(window.updateCockpit) window.updateCockpit();
  requestAnimationFrame(frame);
}

/* ============================================================
   ETAT VEHICULE pour le cockpit (vitesse / rapport / rpm / nav).
   ============================================================ */
var egoKmh = 0;
var RPM_IDLE=850, RPM_SPAN=6100;
function updateState(dt){
  var live = liveFresh();
  HUB3D.live = live;

  var targetKmh = live ? LIVE.speedKmh : (26 + Math.sin(demoT*0.5)*8);
  egoKmh += (targetKmh - egoKmh) * (1 - Math.exp(-(live?3.0:1.5)*dt));
  HUB3D.speedKmh = Math.round(egoKmh);

  var kmh = egoKmh, g, label;
  if(kmh<30){ g=2; label='2'; }
  else if(kmh<60){ g=3; label='3'; }
  else if(kmh<90){ g=4; label='4'; }
  else { g=5; label='D'; }
  HUB3D.gear=g; HUB3D.gearLabel=label;

  var norm = Math.min(1, kmh/120)*0.65 + 0.15;
  HUB3D.rpmNorm = norm;
  HUB3D.rpm = Math.round(RPM_IDLE + norm*RPM_SPAN);

  HUB3D.heading = live ? LIVE.heading : cam.bearing;

  if(live){
    HUB3D.limit = (LIVE.limit!=null) ? LIVE.limit : null;
    HUB3D.eta = LIVE.eta;
    if(LIVE.navOn){
      HUB3D.navDist = Math.max(0, LIVE.navDist);
      HUB3D.navText = LIVE.navText || 'Continuez tout droit';
      HUB3D.remaining = HUB3D.navDist>=1000
        ? (HUB3D.navDist/1000).toFixed(1)+' km'
        : Math.round(HUB3D.navDist)+' m';
    } else {
      HUB3D.navDist=-1; HUB3D.navText=''; HUB3D.remaining=null;
    }
  } else {
    HUB3D.limit = 50;
    HUB3D.eta = null; HUB3D.remaining = null;
    HUB3D.navDist = -1; HUB3D.navText = '';
  }
}

/* ---------- options pilotees par le burger Parametres ---------- */
var opt = { map:true, night:true, sound:true, north:false, view:true };
window.__hubOpt = opt;

/* ---------- OBJETS GEO-3D : POIs + destination (fleches de manoeuvre = etape suivante) ---------- */
var __lastRoute=null;
function poiColor(cls){
  cls=cls||'';
  if(/fuel|charging/.test(cls)) return 0x39d0ff;
  if(/restaurant|fast_food|cafe|food|bar|pub/.test(cls)) return 0xff8a3d;
  if(/shop|mall|supermarket|store|commercial/.test(cls)) return 0xffd23d;
  if(/bus|train|railway|subway|transit|airport/.test(cls)) return 0x4dff88;
  if(/hospital|pharmacy|police|fire/.test(cls)) return 0xff4d5e;
  if(/hotel|lodging/.test(cls)) return 0xb98cff;
  if(/park|garden|pitch|sport/.test(cls)) return 0x6bd86b;
  return 0x69e0ff;
}
function makePoiBeacon(color){
  var T=window.THREE; if(!T) return null;
  var g=new T.Group(); var mat=new T.MeshBasicMaterial({color:color});
  var pole=new T.Mesh(new T.CylinderGeometry(0.18,0.18,5,8), mat); pole.position.y=2.5; g.add(pole);
  var head=new T.Mesh(new T.SphereGeometry(1.0,16,12), mat); head.position.y=6; g.add(head);
  var halo=new T.Mesh(new T.RingGeometry(1.5,2.1,28),
    new T.MeshBasicMaterial({color:color,transparent:true,opacity:0.45,side:T.DoubleSide,depthWrite:false}));
  halo.rotation.x=-Math.PI/2; halo.position.y=0.08; g.add(halo);
  return g;
}
function makeDestPin(){
  var T=window.THREE; if(!T) return null;
  var g=new T.Group(); var col=0x2f7bff; var mat=new T.MeshBasicMaterial({color:col});
  var pole=new T.Mesh(new T.CylinderGeometry(0.22,0.22,8,10), mat); pole.position.y=4; g.add(pole);
  var ball=new T.Mesh(new T.SphereGeometry(1.6,18,14), mat); ball.position.y=9; g.add(ball);
  var cone=new T.Mesh(new T.ConeGeometry(1.0,2.0,16), mat); cone.position.y=7.4; cone.rotation.x=Math.PI; g.add(cone);
  for(var i=0;i<3;i++){ var ring=new T.Mesh(new T.RingGeometry(2.0+i*1.4,2.4+i*1.4,30),
      new T.MeshBasicMaterial({color:col,transparent:true,opacity:0.40-i*0.10,side:T.DoubleSide,depthWrite:false}));
    ring.rotation.x=-Math.PI/2; ring.position.y=0.06; g.add(ring); }
  return g;
}
function vectorSourceId(){
  try{ var s=map.getStyle().sources; for(var k in s){ if(s[k] && s[k].type==='vector') return k; } }catch(_){}
  return 'openmaptiles';
}
function refreshPOIs(){
  if(!window.__geo3d || !window.THREE || !map.querySourceFeatures) return;
  var feats=[]; try{ feats=map.querySourceFeatures(vectorSourceId(),{sourceLayer:'poi'}); }catch(_){ }
  if(!feats || !feats.length) return;
  var c=map.getCenter(), mLon=111320*Math.cos(c.lat*Math.PI/180), mLat=111320, list=[], seen={};
  for(var i=0;i<feats.length;i++){ var f=feats[i]; if(!f.geometry||f.geometry.type!=='Point')continue;
    var lon=f.geometry.coordinates[0], lat=f.geometry.coordinates[1];
    var key=lon.toFixed(5)+','+lat.toFixed(5); if(seen[key])continue; seen[key]=1;
    var dx=(lon-c.lng)*mLon, dy=(lat-c.lat)*mLat;
    list.push({lon:lon,lat:lat,cls:(f.properties&&f.properties.class)||'',d2:dx*dx+dy*dy});
  }
  list.sort(function(a,b){return a.d2-b.d2;});
  window.__geo3d.clear('poi');
  var N=Math.min(18,list.length);
  for(var j=0;j<N;j++){ window.__geo3d.add(makePoiBeacon(poiColor(list[j].cls)), list[j].lon, list[j].lat, 'poi'); }
  window.__poiCount=N;
}
function setDestinationPin(coords){
  if(coords) __lastRoute=coords;
  if(!window.__geo3d || !window.THREE) return;
  window.__geo3d.clear('dest');
  var rc=__lastRoute; if(!rc||rc.length<1) return;
  var d=rc[rc.length-1];
  window.__geo3d.add(makeDestPin(), d[0], d[1], 'dest');
  window.__destSet=true;
}
/* ---------- MONUMENTS UNESCO (1247 sites, dataset whc -> unesco.json) ---------- */
var UNESCO=null;
function loadUnesco(){
  if(UNESCO) return;
  try{ fetch('unesco.json').then(function(r){return r.json();})
    .then(function(j){ UNESCO=j; window.__unescoLoaded=j&&j.length; })
    .catch(function(){}); }catch(_){}
}
function unescoColor(c){ c=c||''; if(/Natural/i.test(c)) return 0x4dff9e; if(/Mixed/i.test(c)) return 0x39e0d0; return 0xffd34d; }  // Culturel=or
function makeUnescoMarker(c){
  var T=window.THREE; if(!T) return null; var col=unescoColor(c); var g=new T.Group();
  var mat=new T.MeshBasicMaterial({color:col});
  // obelisque haut (repere de loin) + diamant lumineux au sommet
  var ob=new T.Mesh(new T.CylinderGeometry(0.5,1.4,26,4), mat); ob.position.y=13; ob.rotation.y=Math.PI/4; g.add(ob);
  var top=new T.Mesh(new T.OctahedronGeometry(2.2,0), mat); top.position.y=28; g.add(top);
  for(var i=0;i<2;i++){ var ring=new T.Mesh(new T.RingGeometry(2.6+i*1.8,3.3+i*1.8,32),
     new T.MeshBasicMaterial({color:col,transparent:true,opacity:0.42-i*0.16,side:T.DoubleSide,depthWrite:false}));
    ring.rotation.x=-Math.PI/2; ring.position.y=0.07; g.add(ring); }
  return g;
}
function refreshUnesco(){
  if(!window.__geo3d || !window.THREE || !UNESCO) return;
  var c=map.getCenter(), mLon=111320*Math.cos(c.lat*Math.PI/180), mLat=111320, R=40000, list=[];  // 40 km
  for(var i=0;i<UNESCO.length;i++){ var s=UNESCO[i];
    var dx=(s.lon-c.lng)*mLon, dy=(s.lat-c.lat)*mLat, d2=dx*dx+dy*dy;
    if(d2 < R*R) list.push({s:s,d2:d2}); }
  list.sort(function(a,b){return a.d2-b.d2;});
  window.__geo3d.clear('unesco');
  var N=Math.min(12,list.length);
  for(var j=0;j<N;j++){ window.__geo3d.add(makeUnescoMarker(list[j].s.c), list[j].s.lon, list[j].s.lat, 'unesco'); }
  window.__unescoCount=N;
}
function geo3dTick(){
  try{ refreshPOIs(); }catch(_){}
  try{ refreshUnesco(); }catch(_){}
  try{ if(__lastRoute && window.__geo3d && window.__geo3d.count('dest')===0) setDestinationPin(); }catch(_){}
}

/* ---------- demarrage carte ---------- */
if(map){
  map.on('load', function(){
    mapReady = true;
    updatePad();
    // FOV ~60 (effet "objectif voiture", profondeur). MapLibre 5.x SAIT le regler
    // (setVerticalFieldOfView) — contrairement a setFreeCameraOptions qui n'existe pas.
    try{ if(typeof map.setVerticalFieldOfView==='function') map.setVerticalFieldOfView(FOV); }catch(_){}
    try{ addBuildings3D(); }catch(_){}
    try{ realRoadWidths(); }catch(_){}                     // routes a l'echelle reelle (metres)
    try{ map.on('style.load', function(){ try{realRoadWidths();}catch(_){} }); }catch(_){}
    try{ applyTheme(opt.night); autoTheme(); }catch(_){}   // 1er rendu puis bascule AUTO jour/nuit (soleil)
    try{ setInterval(autoTheme, 60000); }catch(_){}        // re-verifie chaque minute (lever/coucher)
    try{ loadUnesco(); refreshPOIs(); setInterval(geo3dTick, 4000); }catch(_){}   // POIs + monuments UNESCO 3D + destination
    addPuck(DEMO_POS.lon, DEMO_POS.lat, 0);
    if(LIVE.routeCoords) applyRoute(LIVE.routeCoords);
    startFrame();
  });
  // si 'load' tarde (premier chargement de tuiles vectorielles lent, ou saut GPS lointain),
  // on lance la boucle SANS alarmer ; les vraies erreurs de tuiles sont signalees par map.on('error').
  // On NE force PAS mapReady : quand 'load' finit par arriver, il applique le theme + active le suivi camera.
  setTimeout(function(){ if(!mapReady) startFrame(); }, 14000);
} else {
  // pas de carte du tout : la boucle alimente quand meme le cockpit
  startFrame();
}

/* exposer pour le toggle vue/nord du cockpit */
window.__hubMap = map;
})();
</script>

<script>
"use strict";
/* ===================== PRACTICE COCKPIT OVERLAY — LOGIC ===================== */
(function(){
  var $ = function(id){ return document.getElementById(id); };

  window.HUB3D = window.HUB3D || {};
  var d = { speedKmh:0, gear:0, rpm:0, navDist:-1, navText:'',
    limit:50, heading:null, eta:null, remaining:null, live:false };
  for(var k in d){ if(!(k in window.HUB3D)) window.HUB3D[k] = d[k]; }

  var DEMO_POS = [48.8655, 2.32114];   // Paris, rives de la Seine (site UNESCO) [lat,lon]
  var RPM_MAX  = 8000, RPM_REDLINE = 6800, SHIFT_SEGS = 10;
  var COMPASS  = ['N','NE','E','SE','S','SO','O','NO'];

  var opt = window.__hubOpt || { map:true, night:true, sound:true, north:false, view:true };

  /* ============ MINI-MAP (MapLibre statique, raster sombre) ============ */
  var mini=null, miniMarker=null;
  function initMap(){
    if(mini || !$('ck-miniMap')) return;
    if(typeof maplibregl === 'undefined'){ showMapFallback(); return; }
    try{
      mini = new maplibregl.Map({
        container:'ck-miniMap',
        style:{
          version:8,
          sources:{ 'carto-dark':{
            type:'raster',
            tiles:['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
                   'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png'],
            tileSize:256,
            attribution:'© OpenStreetMap, © CARTO'
          }},
          layers:[{ id:'carto-dark', type:'raster', source:'carto-dark' }]
        },
        center:[DEMO_POS[1], DEMO_POS[0]],
        zoom:14, attributionControl:false, interactive:false
      });
      var el=document.createElement('div'); el.className='ck-me-dot';
      miniMarker = new maplibregl.Marker({element:el}).setLngLat([DEMO_POS[1],DEMO_POS[0]]).addTo(mini);
      var fb=$('ck-mapFallback'); if(fb) fb.style.display='none';
      mini.on('error', function(){ showMapFallback(); });
    }catch(e){ showMapFallback(); }
  }
  function showMapFallback(){ var fb=$('ck-mapFallback'); if(fb) fb.style.display='grid'; }
  window.cockpitSetMapPos = function(lat,lon){
    if(!mini||!miniMarker) return;
    miniMarker.setLngLat([lon,lat]); mini.setCenter([lon,lat]);
  };

  /* ============ SHIFT-LIGHT SEGMENTS ============ */
  (function buildShift(){
    var c=$('ck-shift'); if(!c) return;
    for(var i=0;i<SHIFT_SEGS;i++){ var s=document.createElement('span'); s.className='rh-seg'; c.appendChild(s); }
  })();
  function paintShift(rpm){
    var c=$('ck-shift'); if(!c) return;
    var frac=Math.max(0,Math.min(1,rpm/RPM_MAX)), lit=Math.round(frac*SHIFT_SEGS);
    var redline = rpm>=RPM_REDLINE, segs=c.children;
    for(var i=0;i<segs.length;i++){
      var on=i<lit, cls='rh-seg';
      if(on){ var col=i<5?'g':i<8?'y':'r'; cls+=' on '+col; if(redline) cls+=' bl'; }
      if(segs[i].className!==cls) segs[i].className=cls;
    }
  }

  /* ============ updateCockpit() — every frame ============ */
  var _last={};
  function setTxt(id,val){ if(_last[id]===val) return; var el=$(id); if(el){ el.textContent=val; _last[id]=val; } }

  function updateCockpit(){
    var s = window.HUB3D || {};
    setTxt('ck-spd', Math.round(s.speedKmh||0));

    var g = s.gear|0;
    setTxt('ck-gear', g===0 ? 'N' : String(g));
    var rpm = Math.max(0, s.rpm||0);
    setTxt('ck-rpm', String(Math.round(rpm)));
    paintShift(rpm);

    if(typeof s.heading==='number'){
      var idx=Math.round(((s.heading%360)+360)%360 / 45) % 8;
      setTxt('ck-hdg', COMPASS[idx]);
    }
    if(s.remaining!=null || s.eta!=null){
      setTxt('ck-route', [s.remaining, s.eta].filter(Boolean).join(' · ') || '—');
    } else setTxt('ck-route','—');

    if(s.limit!=null) setTxt('ck-lim', String(s.limit));
    setTxt('ck-eta', s.eta!=null ? s.eta : '—');
    setTxt('ck-rem', s.remaining!=null ? s.remaining : 'restant');

    var nm=$('ck-navMan');
    if(typeof s.navDist==='number' && s.navDist>=0){
      var dd = s.navDist>=1000 ? (s.navDist/1000).toFixed(1)+' km' : Math.round(s.navDist)+' m';
      setTxt('ck-nmDist', dd); setTxt('ck-nmRoad', s.navText || '—');
      if(nm) nm.classList.add('show');
    } else if(nm){ nm.classList.remove('show'); }

    var lvl='SAFE';
    if(s.limit && s.speedKmh){
      if(s.speedKmh > s.limit*1.20) lvl='CRITICAL';
      else if(s.speedKmh > s.limit)  lvl='ALERT';
    }
    var ck=$('cockpit');
    if(ck && ck.getAttribute('data-lvl')!==lvl) ck.setAttribute('data-lvl',lvl);
    setTxt('ck-stateTxt', lvl);
    var dot=$('ck-stateDot');
    if(dot){ var cc = lvl==='CRITICAL'?'var(--crit)':lvl==='ALERT'?'var(--alert)':'var(--safe)';
      if(dot.style.color!==cc){ dot.style.color=cc; dot.style.background=cc; } }

    setTxt('ck-gpsAcc', s.live ? 'LIVE' : 'DEMO');

    var lb=$('ck-live');
    if(lb){ var want=s.live?'live':'demo';
      if(!lb.classList.contains(want)){ lb.className=want; lb.textContent=s.live?'LIVE':'DÉMO'; } }
  }
  window.updateCockpit = updateCockpit;

  /* ============ BURGER "Paramètres" drawer ============ */
  $('ck-burger').addEventListener('click', function(e){
    e.stopPropagation();
    var c=$('ck-ctl'); c.classList.toggle('open');
    this.classList.toggle('on', c.classList.contains('open'));
  });
  document.addEventListener('click', function(e){
    var c=$('ck-ctl'), b=$('ck-burger');
    if(c.classList.contains('open') && !c.contains(e.target) && e.target!==b && !b.contains(e.target)){
      c.classList.remove('open'); b.classList.remove('on');
    }
  });

  function toggleBtn(btn, key, onLabel, offLabel){
    opt[key]=!opt[key];
    btn.classList.toggle('on', opt[key]);
    if(onLabel) btn.textContent = opt[key]?onLabel:offLabel;
  }
  $('ck-bMap').addEventListener('click', function(){
    toggleBtn(this,'map');
    $('cockpit').setAttribute('data-map', opt.map?'on':'off');
    if(opt.map){ initMap(); setTimeout(function(){ try{mini&&mini.resize();}catch(e){} },120); }
  });
  $('ck-bNight').addEventListener('click', function(){
    toggleBtn(this,'night'); window.dispatchEvent(new CustomEvent('cockpit:night',{detail:opt.night}));
  });
  $('ck-bSound').addEventListener('click', function(){
    toggleBtn(this,'sound','🔊 Son','🔇 Muet');
    window.dispatchEvent(new CustomEvent('cockpit:sound',{detail:opt.sound}));
  });
  /* "Nord en haut" retire : bouton absent, listener neutralise (la camera
     suit toujours le cap). On garde un garde-fou si le bouton revenait. */
  var _bNorth = $('ck-bNorth');
  if(_bNorth){ _bNorth.style.display='none'; }
  $('ck-bView').addEventListener('click', function(){
    opt.view=!opt.view; this.classList.toggle('on', opt.view);
    window.dispatchEvent(new CustomEvent('cockpit:view',{detail:opt.view}));
  });
  /* RECENTRER : repasse en mode suivi + snap doux (logique cote moteur carte). */
  (function(){
    var rc=$('ck-recenter');
    if(rc) rc.addEventListener('click', function(e){
      e.stopPropagation();
      if(typeof window.__hubRecenter==='function') window.__hubRecenter();
    });
  })();
  $('ck-bFull').addEventListener('click', function(){
    var el=document.documentElement, btn=this;
    try{
      var req = el.requestFullscreen || el.webkitRequestFullscreen;
      var exit = document.exitFullscreen || document.webkitExitFullscreen;
      var isFull = document.fullscreenElement || document.webkitFullscreenElement;
      if(!isFull){ if(req){ req.call(el); btn.classList.add('on'); } }
      else { if(exit){ exit.call(document); } btn.classList.remove('on'); }
    }catch(e){}
  });

  /* ============ INIT ============ */
  function boot(){
    $('cockpit').setAttribute('data-lvl','SAFE');
    $('cockpit').setAttribute('data-map','on');
    initMap();
    updateCockpit();
    setInterval(updateCockpit, 200);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
/* =================== /PRACTICE COCKPIT OVERLAY — LOGIC ==================== */
</script>

<script type="module">
/* ============================================================
   VOITURE 3D : couche custom MapLibre rendue avec Three.js.
   Vrai modele 3D -> scale avec le zoom, s'incline avec le pitch.
   Position/orientation lues dans window.__carPos (alimente par la boucle).
   Constantes de calage faciles a ajuster sur appareil : CARSCALE / CAR_YAW_OFFSET.
   ============================================================ */
import * as THREE from 'three';
window.THREE = THREE;   // expose THREE au script classique (builders POIs/destination)
/* RoundedBoxGeometry : arêtes arrondies facon Cybertruck (port hud3d.html).
   Si l'addon ne charge pas (CDN/bundle), repli automatique sur BoxGeometry. */
let RoundedBoxGeometry = null;
try{
  ({ RoundedBoxGeometry } = await import('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/geometries/RoundedBoxGeometry.js'));
}catch(_){ RoundedBoxGeometry = null; }
function rbox(w,h,d,seg,rad){
  return RoundedBoxGeometry ? new RoundedBoxGeometry(w,h,d,seg,rad) : new THREE.BoxGeometry(w,h,d);
}

/* OPTION GLTF (point d'entree commente) : pour charger un .glb si une URL fiable
   est fournie plus tard. Laisser null -> le vehicule procedural reste par defaut.
   Exemple :
     import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
     new GLTFLoader().load(CAR_GLB_URL, function(gltf){ ... remplacer this.car ... });
*/
var CAR_GLB_URL = 'car-real.glb';   // Maybach Blender glTF (vrais materiaux/peinture/feux, Y-up)

(function(){
  var CARSCALE = 1.0;        // multiplicateur de taille global (1 = taille reelle TARGET_CAR_LEN)
  var CAR_YAW_OFFSET = 0;    // decalage d'orientation (radians) cote rendu
  var TARGET_CAR_LEN = 5.0;  // longueur reelle visee de la voiture (metres) — auto-mise a l'echelle
  var GLB_LIFT = 0;          // ajuste la hauteur au sol (0 = roues au sol ; + pour remonter)
  var GLB_YAW  = 0;          // oriente l'avant : 0 / Math.PI (marche arriere) / +-Math.PI/2 (de travers)
  var GLB_FLIP = false;      // true si le modele apparait couche (glb exporte en Z-up)
  var GLB_MIRROR = true;     // true : reconstruit la moitie manquante (modele exporte sans appliquer le miroir Blender)
  var ACCENT = 0x2f7bff;     // accent anneau FSD (DA hub)
  function start(){
    var map = window.__hubMap, ml = window.maplibregl;
    if(!map || !ml){ return setTimeout(start, 250); }
    /* ----------------------------------------------------------------
       Modele EGO porte depuis hud3d.html (makeCar, look Cybertruck).
       Convention MODELE Three Y-up : avant vers +Z, roues au sol (y~0).
       L'adaptation a l'espace MapLibre (Z-up) se fait dans render() via
       un rotateX(+PI/2) ; ici on reste dans le repere natif du modele.
       ---------------------------------------------------------------- */
    function buildCar(){
      var car = new THREE.Group();
      var color = 0x9aa0a8;  // caisse EGO metallique claire

      // Caisse metallique anguleuse
      var body = new THREE.Mesh(rbox(1.9,0.6,4.1,4,0.26),
        new THREE.MeshStandardMaterial({color:color,roughness:0.45,metalness:0.55}));
      body.position.y = 0.55; car.add(body);

      // Cabine vitree sombre, legerement reculee
      var cabin = new THREE.Mesh(rbox(1.6,0.52,2.0,4,0.2),
        new THREE.MeshStandardMaterial({color:0x0c0f14,roughness:0.12,metalness:0.2}));
      cabin.position.set(0,1.02,-0.15); car.add(cabin);

      // 4 roues (cylindres couches sur l'axe X)
      var wheelGeo=new THREE.CylinderGeometry(0.37,0.37,0.3,16);
      var wheelMat=new THREE.MeshStandardMaterial({color:0x090909,roughness:0.85});
      var wp=[[-0.9,1.35],[0.9,1.35],[-0.9,-1.35],[0.9,-1.35]];
      for(var i=0;i<4;i++){
        var w=new THREE.Mesh(wheelGeo,wheelMat);
        w.rotation.z=Math.PI/2; w.position.set(wp[i][0],0.37,wp[i][1]); car.add(w);
      }

      // Feux : plans. Arriere rouges (z=-2.06) / phares EGO froids (z=+2.06 = AVANT)
      var lightGeo=new THREE.PlaneGeometry(0.34,0.16);
      var tailMat=new THREE.MeshBasicMaterial({color:0xff2a22});
      var headMat=new THREE.MeshBasicMaterial({color:0xeaf2ff});
      [-0.6,0.6].forEach(function(px){
        var t=new THREE.Mesh(lightGeo,tailMat); t.position.set(px,0.55,-2.06); t.rotation.y=Math.PI; car.add(t);
        var h=new THREE.Mesh(lightGeo,headMat); h.position.set(px,0.55,2.06); car.add(h);
      });

      // Anneau de guidage FSD au sol (EGO)
      var ring=new THREE.Mesh(new THREE.TorusGeometry(2.0,0.04,8,40),
        new THREE.MeshBasicMaterial({color:ACCENT,transparent:true,opacity:0.5,
          blending:THREE.AdditiveBlending,depthWrite:false}));
      ring.rotation.x=-Math.PI/2; ring.position.y=0.06; ring.scale.set(1.0,1.5,1.0);
      car.add(ring);

      return car;
    }
    var layer = {
      id:'ego-car-3d', type:'custom', renderingMode:'3d',
      onAdd:function(m, gl){
        var self=this;
        this.scene=new THREE.Scene();
        this.scene.add(new THREE.AmbientLight(0xffffff,1.15));
        var d=new THREE.DirectionalLight(0xffffff,1.5); d.position.set(40,-60,120); this.scene.add(d);
        this.car=new THREE.Group(); this.scene.add(this.car);
        var fallback=buildCar(); fallback.visible=false; this.car.add(fallback);  // cache : on ne montre PAS l'ancienne voiture
        var fbTimer=null;
        if(CAR_GLB_URL){
          fbTimer=setTimeout(function(){ try{ fallback.visible=true; }catch(_){} }, 9000);  // secours seulement si glb tres lent
          var self=this;
          Promise.all([
            import('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js'),
            import('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/meshopt_decoder.module.js')
          ]).then(function(mods){
            var loader=new mods[0].GLTFLoader();
            try{ loader.setMeshoptDecoder(mods[1].MeshoptDecoder); }catch(_){}   // glb compresse meshopt
            loader.load(CAR_GLB_URL, function(gltf){
              try{
                if(fbTimer) clearTimeout(fbTimer);          // glb arrive a temps -> pas de placeholder
                self.car.remove(fallback);                 // glb charge -> on retire le procedural
                var inner=gltf.scene;                       // glb Blender glTF : Y-up + VRAIS materiaux/feux
                // auto-ajustement : echelle reelle (m) + centrage horizontal + roues au sol
                var box=new THREE.Box3().setFromObject(inner);
                var size=box.getSize(new THREE.Vector3()), ctr=box.getCenter(new THREE.Vector3());
                var len=Math.max(size.x,size.z)||1, k=TARGET_CAR_LEN/len;
                inner.scale.setScalar(k);
                if(GLB_FLIP) inner.rotation.x=-Math.PI/2;   // secours si modele couche (Z-up)
                inner.position.set(-ctr.x*k, -box.min.y*k + GLB_LIFT, -ctr.z*k);
                var holder=new THREE.Group();
                holder.add(inner);
                holder.rotation.y = (size.x>size.z?Math.PI/2:0) + GLB_YAW;  // longueur -> +Z, + ajust manuel
                self.car.add(holder);
                // boost reflexions (metaux : roues/chrome/freins) sur tous les materiaux
                inner.traverse(function(ob){ if(ob.isMesh&&ob.material){ (Array.isArray(ob.material)?ob.material:[ob.material]).forEach(function(mt){ if('envMapIntensity' in mt) mt.envMapIntensity=1.3; mt.needsUpdate=true; }); } });
                // --- RECONSTRUCTION MIROIR : le modele a ete exporte sans appliquer le modificateur
                //     "Miroir" de Blender -> il manque une moitie (roues d'un cote, feux/vitres de
                //     l'autre). On duplique en miroir (axe largeur X) les pieces DECENTREES ; les
                //     pieces centrales (corps, toit, capot, plaque) ne sont PAS dupliquees. ---
                if(GLB_MIRROR){ try{
                  var mg=new THREE.Group(); mg.scale.x=-1; holder.add(mg);     // miroir gauche-droite
                  var clone=inner.clone(true); mg.add(clone);
                  var oL=[],cL=[]; inner.traverse(function(o){if(o.isMesh)oL.push(o);}); clone.traverse(function(o){if(o.isMesh)cL.push(o);});
                  self.car.updateMatrixWorld(true);
                  var kept=0;
                  for(var mi=0;mi<oL.length;mi++){
                    var bb=new THREE.Box3().setFromObject(oL[mi]); var cxm=(bb.min.x+bb.max.x)/2;
                    if(Math.abs(cxm)<=0.06){ if(cL[mi]) cL[mi].visible=false; }   // piece centrale -> pas de doublon
                    else kept++;
                  }
                  window.__mirror=kept;
                }catch(e){ window.__mirror='err:'+(e&&e.message); } }
                try{ window.__carRoot=self.car; window.__scene=self.scene; window.THREE=THREE; }catch(_){}  // debug
                window.__carFit={len:+(len).toFixed(2),k:+k.toFixed(3),sx:+size.x.toFixed(2),sy:+size.y.toFixed(2),sz:+size.z.toFixed(2),mats:(gltf.parser&&gltf.parser.json&&gltf.parser.json.materials||[]).length};
              }catch(e){ try{ fallback.visible=true; }catch(_){} }   // souci -> on montre le procedural
            }, undefined, function(){ try{ if(fbTimer)clearTimeout(fbTimer); fallback.visible=true; }catch(_){} }); })   // echec -> placeholder
            .catch(function(){ try{ fallback.visible=true; }catch(_){} });
        }
        this.camera=new THREE.Camera();
        // pattern canonique MapLibre + Three : partage canvas + contexte WebGL de la carte.
        // (En WebGL software headless, Chromium peut logguer "different context type" -> sans
        //  effet sur appareil reel WebGL2. Sur device le rendu fonctionne.)
        this.renderer=new THREE.WebGLRenderer({canvas:m.getCanvas(),context:gl,antialias:true});
        this.renderer.autoClear=false;
        // ENVIRONMENT MAP : sans reflexions, les materiaux METALLIQUES (roues, chrome, freins)
        // s'affichent NOIRS/invisibles. RoomEnvironment (procedural) -> PMREM -> scene.environment.
        try{
          var pmrem=new THREE.PMREMGenerator(this.renderer);
          import('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/environments/RoomEnvironment.js')
            .then(function(mod){ try{ self.scene.environment=pmrem.fromScene(new mod.RoomEnvironment(),0.04).texture; window.__env=true; }catch(_){}})
            .catch(function(){});
        }catch(_){}
        // matrices reutilisees chaque frame (pas de re-allocation -> evite la fuite/GC churn)
        this._mProj=new THREE.Matrix4();
        this._mModel=new THREE.Matrix4();
        this._mTmp=new THREE.Matrix4();
        window.__car3d=true;
        // --- SYSTEME GEO-3D reutilisable : pose des objets 3D a une position GPS (POIs,
        //     destination, fleches de manoeuvre). 2e scene rendue avec origine = centre carte ;
        //     chaque objet positionne en METRES relatifs a l'origine (modeles Y-up). ---
        this.geoScene=new THREE.Scene();
        this.geoScene.add(new THREE.AmbientLight(0xffffff,1.25));
        var gd=new THREE.DirectionalLight(0xffffff,1.1); gd.position.set(30,-50,80); this.geoScene.add(gd);
        this.geoReg=[];
        var gself=this;
        window.__geo3d={
          add:function(obj,lon,lat,kind,elev){ gself.geoScene.add(obj); gself.geoReg.push({obj:obj,lon:lon,lat:lat,kind:kind||'',elev:elev||0}); return obj; },
          clear:function(kind){ gself.geoReg=gself.geoReg.filter(function(r){ if(kind&&r.kind!==kind)return true; gself.geoScene.remove(r.obj); return false; }); },
          count:function(kind){ return gself.geoReg.filter(function(r){return !kind||r.kind===kind;}).length; }
        };
        window.__geo3dReady=true;
      },
      render:function(gl, args){
        var pos=window.__carPos; if(!pos){ var c=map.getCenter(); pos={lon:c.lng,lat:c.lat,bearing:0}; }
        // MapLibre 5.x : la matrice de projection est dans args.defaultProjectionData.mainMatrix
        // (fallback : argument direct = ancienne API). Source : doc Context7.
        var mat=(args && args.defaultProjectionData && args.defaultProjectionData.mainMatrix) ? args.defaultProjectionData.mainMatrix : args;
        if(!mat){ map.triggerRepaint(); return; }   // pas de matrice fournie -> on saute la frame proprement
        var merc=ml.MercatorCoordinate.fromLngLat([pos.lon,pos.lat],0);
        var s=merc.meterInMercatorCoordinateUnits();
        // MapLibre = Z-up ; le modele EGO est Y-up (avant +Z, haut +Y).
        // 1) place+echelle Mercator (Y inverse), 2) cap autour de l'axe vertical
        //    MapLibre (Z), 3) bascule le modele Y-up -> Z-up via rotateX(+PI/2),
        // 4) echelle d'ajustement CARSCALE.
        // Matrices PRE-ALLOUEES (this._m*) reutilisees : aucun new THREE.Matrix4() par frame.
        var l=this._mModel.makeTranslation(merc.x,merc.y,merc.z)
          .multiply(this._mTmp.makeScale(s,-s,s))
          .multiply(this._mTmp.makeRotationZ(-(pos.bearing||0)*Math.PI/180 + CAR_YAW_OFFSET))
          .multiply(this._mTmp.makeRotationX(Math.PI/2))
          .multiply(this._mTmp.makeScale(CARSCALE,CARSCALE,CARSCALE));
        this.camera.projectionMatrix=this._mProj.fromArray(mat).multiply(l);
        this.renderer.resetState();
        this.renderer.render(this.scene,this.camera);
        // --- 2e passe : objets GEO-3D (POIs / destination / fleches), origine = centre carte ---
        if(this.geoReg && this.geoReg.length){
          var oc=map.getCenter();
          var oM=ml.MercatorCoordinate.fromLngLat([oc.lng,oc.lat],0), gs=oM.meterInMercatorCoordinateUnits();
          var mLat=111320, mLon=111320*Math.cos(oc.lat*Math.PI/180);
          for(var gi=0;gi<this.geoReg.length;gi++){ var r=this.geoReg[gi];
            r.obj.position.set((r.lon-oc.lng)*mLon, r.elev||0, -(r.lat-oc.lat)*mLat);
          }
          var gL=this._mModel.makeTranslation(oM.x,oM.y,oM.z)
            .multiply(this._mTmp.makeScale(gs,-gs,gs))
            .multiply(this._mTmp.makeRotationX(Math.PI/2));
          this.camera.projectionMatrix=this._mProj.fromArray(mat).multiply(gL);
          this.renderer.resetState();
          this.renderer.render(this.geoScene,this.camera);
        }
        map.triggerRepaint();
      }
    };
    function add(){ try{ if(map.getLayer && !map.getLayer('ego-car-3d')) map.addLayer(layer); }catch(e){ /* fallback : le marqueur 2D voiture reste */ } }
    if(map.isStyleLoaded && map.isStyleLoaded()) add();
    map.on('load', add); map.on('style.load', add);
  }
  start();
})();
</script>
