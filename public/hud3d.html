<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Drive 3D — Hub immersif PRO (cockpit)</title>

<!-- Practice fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#05070f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  canvas{display:block;}
  /* HUD minimal de debug (conserve, place tres bas a gauche, sous le cockpit) */
  #hud{position:fixed;left:18px;bottom:96px;color:#cfe0ff;letter-spacing:.5px;
       text-shadow:0 1px 6px rgba(0,0,0,.6);pointer-events:none;user-select:none;
       z-index:4;opacity:.0;}
  #hud .spd{font-size:42px;font-weight:600;line-height:1;}
  #hud .unit{font-size:14px;opacity:.6;margin-left:4px;}
  #hud .sub{font-size:12px;opacity:.55;margin-top:6px;text-transform:uppercase;}
  #vig{position:fixed;inset:0;pointer-events:none;z-index:3;
       box-shadow:inset 0 0 200px 40px rgba(0,0,0,.45);}
</style>

<style>
/* ===================== PRACTICE COCKPIT OVERLAY — STYLE ===================== */
#cockpit{
  --acc:#FF5000; --mono:'JetBrains Mono',monospace;
  --safe:#39d98a; --alert:#f5a623; --crit:#ff3b46;
  --txt:#F2F3F5; --faint:#6c727a;
  position:absolute; inset:0; z-index:10;
  font-family:'Inter',sans-serif; color:var(--txt);
  pointer-events:none;                 /* overlay is click-through by default */
  -webkit-user-select:none; user-select:none;
}
/* only interactive children catch clicks → the 3D scene below stays draggable */
#cockpit .ck-panel,
#cockpit #ck-burger,
#cockpit #ck-ctl,
#cockpit #ck-miniMap{ pointer-events:auto; }

#cockpit, #cockpit *{ box-sizing:border-box; margin:0; padding:0; }

/* ---- ambient washes ---- */
#ck-warm{position:absolute;inset:0;pointer-events:none;z-index:1;opacity:.35;background:
  radial-gradient(130% 90% at 50% 22%, rgba(255,80,0,.16), transparent 58%),
  radial-gradient(90% 70% at 10% 96%, rgba(150,28,72,.14), transparent 55%),
  radial-gradient(90% 70% at 92% 92%, rgba(120,30,90,.12), transparent 55%);}
#ck-vig{position:absolute;inset:0;pointer-events:none;z-index:2;
  box-shadow:inset 0 0 220px -40px var(--lvl,transparent);transition:box-shadow .5s;}
#cockpit[data-lvl="ALERT"] #ck-vig{--lvl:rgba(245,166,35,.45);}
#cockpit[data-lvl="CRITICAL"] #ck-vig{animation:ck-pulse 1s ease-in-out infinite;}
@keyframes ck-pulse{0%,100%{box-shadow:inset 0 0 200px -50px rgba(255,59,70,.5)}
  50%{box-shadow:inset 0 0 260px -20px rgba(255,59,70,.85)}}

/* ---- glass panel base ---- */
.ck-panel{position:absolute;z-index:5;
  background:
    linear-gradient(135deg, rgba(255,80,0,.14), rgba(120,28,62,.06) 55%, rgba(30,12,22,.12)),
    rgba(16,11,14,.42);
  backdrop-filter:blur(28px) saturate(1.3);-webkit-backdrop-filter:blur(28px) saturate(1.3);
  border:.5px solid rgba(255,255,255,.14);border-radius:20px;padding:14px 16px;
  box-shadow:0 18px 55px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.07);}
.ck-lbl{font-family:var(--mono);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);}
.ck-ttl{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  color:#565b61;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.ck-ttl b{color:var(--acc);}
.ck-v{font-family:var(--mono);font-size:12px;}
.ck-trow{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-size:12px;}
.ck-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;
  letter-spacing:.1em;padding:4px 9px;border-radius:20px;border:.5px solid rgba(255,255,255,.14);}
.ck-dot{width:7px;height:7px;border-radius:50%;background:var(--safe);box-shadow:0 0 8px currentColor;color:var(--safe);}

/* ---- top-left telemetry ---- */
#ck-tele{top:calc(16px + env(safe-area-inset-top));left:calc(16px + env(safe-area-inset-left));width:215px;}
.ck-big{font-size:46px;font-weight:200;letter-spacing:-2px;line-height:1;font-family:var(--mono);}
.ck-big small{font-size:13px;color:#8b9298;letter-spacing:0;margin-left:6px;}

/* ---- bottom-right mini-map ---- */
#ck-mapPanel{bottom:calc(16px + env(safe-area-inset-bottom));right:calc(16px + env(safe-area-inset-right));width:230px;padding:12px 13px;}
#ck-miniMap{width:100%;height:150px;border-radius:12px;margin-top:9px;background:#0a0c10;overflow:hidden;position:relative;}
#ck-miniMap .leaflet-control-attribution{display:none!important;}
#ck-mapFallback{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);
  font-size:9px;letter-spacing:.16em;color:#565b61;text-align:center;
  background:repeating-linear-gradient(45deg,#0a0c10 0 12px,#0d1015 12px 24px);}
.ck-me-dot{width:14px;height:14px;border-radius:50%;background:var(--acc);
  box-shadow:0 0 0 4px rgba(255,80,0,.25),0 0 12px var(--acc);}
#cockpit[data-map="off"] #ck-mapPanel{display:none;}

/* ---- burger "Paramètres" (top-right) + drawer ---- */
#ck-burger{position:absolute;top:calc(16px + env(safe-area-inset-top));right:calc(16px + env(safe-area-inset-right));
  z-index:33;pointer-events:auto;background:rgba(8,10,14,.72);border:.5px solid rgba(255,255,255,.18);
  color:var(--txt);border-radius:12px;padding:9px 14px;font-size:12.5px;cursor:pointer;
  font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);display:flex;align-items:center;gap:9px;}
#ck-burger:hover{border-color:var(--acc);}
#ck-burger.on{border-color:var(--acc);color:var(--acc);}
#ck-burger .bi{display:inline-flex;flex-direction:column;gap:2.5px;}
#ck-burger .bi i{width:15px;height:1.6px;background:currentColor;border-radius:2px;}
#ck-ctl{top:calc(58px + env(safe-area-inset-top));right:calc(16px + env(safe-area-inset-right));
  z-index:32;display:none;flex-direction:column;gap:7px;align-items:stretch;padding:12px;width:218px;
  max-height:calc(100vh - 96px);overflow-y:auto;scrollbar-width:none;}
#ck-ctl.open{display:flex;}
#ck-ctl::-webkit-scrollbar{display:none;}
#ck-ctl button{background:rgba(255,255,255,.06);border:.5px solid rgba(255,255,255,.14);color:var(--txt);
  border-radius:11px;padding:9px 13px;font-size:12px;cursor:pointer;font-family:'Inter';
  transition:.15s;white-space:nowrap;text-align:left;}
#ck-ctl button:hover{border-color:var(--acc);}
#ck-ctl button.on{background:var(--acc);color:#000;border-color:var(--acc);font-weight:600;}
#ck-ctl .ck-sep{height:1px;background:rgba(255,255,255,.12);margin:4px 2px;}

/* ---- live badge ---- */
#ck-live{position:absolute;top:calc(34px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  z-index:42;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.2em;
  padding:5px 13px;border-radius:20px;border:.5px solid rgba(255,255,255,.16);background:rgba(0,0,0,.5);
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);pointer-events:none;
  transition:color .3s,border-color .3s,box-shadow .3s;}
#ck-live.live{color:var(--safe);border-color:rgba(57,217,138,.55);box-shadow:0 0 16px -4px rgba(57,217,138,.6);}
#ck-live.demo{color:var(--alert);border-color:rgba(245,166,35,.5);}

/* ---- top-center nav band (speed limit + ETA) ---- */
#ck-navAmp{position:absolute;top:62px;left:50%;transform:translateX(-50%);z-index:13;
  display:flex;align-items:center;gap:10px;pointer-events:none;font-family:var(--mono);}
#ck-navAmp>div{background:rgba(12,14,18,.62);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:.5px solid rgba(255,255,255,.12);border-radius:12px;padding:5px 10px;
  display:flex;align-items:center;gap:7px;box-shadow:0 6px 18px rgba(0,0,0,.3);}
.na-lim b{display:grid;place-items:center;width:30px;height:30px;border-radius:50%;
  background:#fff;color:#c0202a;border:2.5px solid #d11a25;font-size:14px;font-weight:800;}
.na-eta b{font-size:14px;color:var(--txt);} .na-eta span{font-size:11px;color:#8b9298;margin-left:6px;}

/* ---- top-center maneuver card ---- */
#ck-navMan{position:absolute;top:104px;left:50%;transform:translateX(-50%);z-index:13;
  display:none;align-items:center;gap:12px;background:rgba(12,14,18,.66);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:.5px solid rgba(255,255,255,.14);
  border-radius:16px;padding:9px 16px;box-shadow:0 8px 24px rgba(0,0,0,.34);
  pointer-events:none;font-family:var(--mono);}
#ck-navMan.show{display:flex;}
#ck-navMan .nm-arrow{color:var(--acc);display:flex;align-items:center;}
#ck-navMan .nm-txt{display:flex;flex-direction:column;line-height:1.12;}
#ck-navMan .nm-txt b{font-size:22px;color:#fff;}
#ck-navMan .nm-txt span{font-size:12px;color:#9aa3b2;max-width:200px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;}

/* ---- bottom-left race cluster (gear + rpm) ---- */
#ck-raceHud{position:absolute;left:calc(16px + env(safe-area-inset-left));bottom:calc(16px + env(safe-area-inset-bottom));
  z-index:6;display:flex;align-items:center;gap:14px;width:215px;padding:11px 12px;border-radius:16px;
  background:rgba(8,10,14,.62);border:.5px solid rgba(255,255,255,.1);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);font-family:var(--mono);
  box-shadow:0 14px 44px -18px rgba(0,0,0,.75);pointer-events:none;}
#ck-raceHud .rh-lab{display:block;font-size:7px;letter-spacing:.16em;color:#7a808c;
  text-transform:uppercase;margin-bottom:3px;text-align:center;}
#ck-raceHud .rh-gear b{font-size:34px;font-weight:700;color:#fff;line-height:1;display:block;text-align:center;}
#ck-raceHud .rh-rpm{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;}
#ck-raceHud .rh-shift{display:flex;gap:3px;}
#ck-raceHud .rh-seg{width:8px;height:14px;border-radius:2px;background:rgba(255,255,255,.09);}
#ck-raceHud .rh-seg.on.g{background:var(--safe);box-shadow:0 0 6px var(--safe);}
#ck-raceHud .rh-seg.on.y{background:#f5d020;box-shadow:0 0 6px #f5d020;}
#ck-raceHud .rh-seg.on.r{background:var(--crit);box-shadow:0 0 7px var(--crit);}
#ck-raceHud .rh-seg.bl{animation:ck-blink .12s steps(1) infinite;}
@keyframes ck-blink{0%{opacity:1}50%{opacity:.2}}
#ck-raceHud .rh-rpmrow{display:flex;align-items:baseline;gap:4px;}
#ck-raceHud .rh-rpmv{font-size:17px;color:#fff;font-weight:600;}
#ck-raceHud .rh-unit{font-size:8px;color:#7a808c;}

/* ---- responsive ---- */
@media(max-width:1024px){
  #ck-tele,#ck-mapPanel{width:185px;} #ck-miniMap{height:118px;} .ck-big{font-size:40px;}
}
@media(max-width:760px){
  .ck-panel{padding:10px 11px;border-radius:14px;}
  #ck-tele{top:calc(42px + env(safe-area-inset-top));left:8px;width:40vw;max-width:175px;}
  #ck-mapPanel{top:calc(42px + env(safe-area-inset-top));right:8px;bottom:auto;width:40vw;max-width:175px;}
  #ck-miniMap{height:88px;margin-top:7px;}
  .ck-big{font-size:28px;}
  #ck-navAmp{top:46px;gap:6px;transform:translateX(-50%) scale(.9);}
  #ck-navMan{top:82px;padding:7px 12px;gap:8px;} #ck-navMan .nm-txt b{font-size:18px;}
  #ck-ctl{top:calc(56px + env(safe-area-inset-top));right:8px;width:min(82vw,232px);border-radius:18px;}
  #ck-raceHud{width:168px;bottom:calc(14px + env(safe-area-inset-bottom));}
  #ck-raceHud .rh-gear b{font-size:26px;}
  #ck-live{top:calc(12px + env(safe-area-inset-top));font-size:9px;letter-spacing:.1em;padding:4px 9px;}
}
@media(prefers-reduced-motion:reduce){
  #ck-raceHud .rh-seg.bl{animation:none;} #cockpit[data-lvl="CRITICAL"] #ck-vig{animation:none;}
}
/* =================== /PRACTICE COCKPIT OVERLAY — STYLE ==================== */
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<body>

<!-- HUD minimal de debug (conserve) ; le canvas Three.js est insere par JS juste apres -->
<div id="hud"><span class="spd">0</span><span class="unit">km/h</span><div class="sub">Trajectoire active</div></div>
<div id="vig"></div>

<!-- ===================== PRACTICE COCKPIT OVERLAY ===================== -->
<div id="cockpit" aria-hidden="false">

  <!-- ambient washes (purely decorative, no pointer) -->
  <div id="ck-warm"></div>
  <div id="ck-vig"></div>

  <!-- live badge (top-center top) -->
  <div id="ck-live" class="demo">DÉMO</div>

  <!-- top-center : nav band (speed limit + maneuver) -->
  <div id="ck-navAmp">
    <div class="na-lim" title="Limite de vitesse"><b id="ck-lim">50</b></div>
    <div class="na-eta"><b id="ck-eta">—</b><span id="ck-rem">restant</span></div>
  </div>
  <div id="ck-navMan">
    <div class="nm-arrow" id="ck-nmArrow">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor"
           stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V6M6 12l6-6 6 6"/>
      </svg>
    </div>
    <div class="nm-txt"><b id="ck-nmDist">—</b><span id="ck-nmRoad">—</span></div>
  </div>

  <!-- top-left : telemetry (speed) -->
  <div class="ck-panel" id="ck-tele">
    <div class="ck-ttl">
      <span><b>01</b> Véhicule</span>
      <span class="ck-chip"><span class="ck-dot" id="ck-stateDot"></span><span id="ck-stateTxt">SAFE</span></span>
    </div>
    <div class="ck-big"><span id="ck-spd">0</span><small>km/h</small></div>
    <div class="ck-trow"><span class="ck-lbl">Cap</span><span class="ck-v" id="ck-hdg">N</span></div>
    <div class="ck-trow"><span class="ck-lbl">Itinéraire</span><span class="ck-v" id="ck-route">—</span></div>
  </div>

  <!-- top-right : burger "Paramètres" + drawer -->
  <button id="ck-burger" aria-label="Paramètres">
    <span class="bi"><i></i><i></i><i></i></span>Paramètres
  </button>
  <div class="ck-panel" id="ck-ctl">
    <button id="ck-bView" class="on">🛰 Vue 3D</button>
    <button id="ck-bNorth">🧭 Nord libre</button>
    <div class="ck-sep"></div>
    <button id="ck-bMap" class="on">🗺 Mini-carte</button>
    <button id="ck-bNight">🌙 Nuit</button>
    <button id="ck-bSound" class="on">🔊 Son</button>
    <div class="ck-sep"></div>
    <button id="ck-bFull">⛶ Plein écran</button>
  </div>

  <!-- bottom-left : race cluster (gear + rpm) -->
  <div id="ck-raceHud" aria-hidden="true">
    <div class="rh-gear"><span class="rh-lab">RAPPORT</span><b id="ck-gear">N</b></div>
    <div class="rh-rpm">
      <div class="rh-shift" id="ck-shift"></div>
      <div class="rh-rpmrow"><span class="rh-rpmv" id="ck-rpm">0</span><span class="rh-unit">tr/min</span></div>
    </div>
  </div>

  <!-- bottom-right : mini-map -->
  <div class="ck-panel" id="ck-mapPanel">
    <div class="ck-ttl"><span><b>05</b> GPS live</span><span class="ck-lbl" id="ck-gpsAcc">DEMO</span></div>
    <div id="ck-miniMap"><div id="ck-mapFallback">CARTE INDISPONIBLE</div></div>
  </div>

</div>
<!-- =================== /PRACTICE COCKPIT OVERLAY ===================== -->

<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

/* ============================================================
   ETAT GLOBAL EXPOSE — le cockpit DOM s'y branche.
   Mis a jour chaque frame par la sim.
   NB: champs etendus pour le cockpit :
     gear  -> nombre (0=N) attendu par le cockpit
     gearLabel -> libelle d'origine ('D','2'...) conserve pour ref
     rpm   -> regime reel (tr/min) attendu par le cockpit
     rpmNorm -> ancienne valeur normalisee 0..1 conservee pour ref
   ============================================================ */
const HUB3D = window.HUB3D = {
  speedKmh: 0,   // vitesse affichee (km/h)
  gear: 0,       // rapport (nombre, 0 = N) pour le cockpit
  gearLabel:'D', // libelle d'origine
  rpm: 0,        // regime moteur reel (tr/min)
  rpmNorm: 0,    // regime normalise 0..1 (compat)
  navDist: 0,    // distance avant prochaine manoeuvre (m)
  navText: 'Continuez tout droit',
  limit: 90,     // limite de vitesse courante (km/h)
  heading: 0,    // cap 0..360 (deg)
  live: false,   // DEMO par defaut
  eta: null,     // texte ETA fourni par la nav (LIVE)
  remaining: null// texte distance restante (LIVE)
};

/* ============================================================
   BRANCHEMENT GPS REEL — sortie du mode demo.
   os.html charge ce hub dans une IFRAME et lui envoie via
   window.postMessage des messages typés (gps / nav / route / mode).
   Logique : des qu'un 'gps' arrive -> mode LIVE (timestamp). Si plus
   aucun 'gps' depuis LIVE_TIMEOUT ms -> retour DEMO (sim actuelle).
   Robustesse : jamais d'erreur si un champ manque (valeurs par defaut).
   ============================================================ */
const LIVE_TIMEOUT = 5000;          // ms sans 'gps' -> retour DEMO
const LIVE = {
  active: false,
  lastGps: -1e9,                    // performance.now() du dernier 'gps'
  speedKmh: 0,                      // vitesse reelle (km/h)
  heading: 0,                       // cap reel (deg)
  lat: null, lon: null, acc: null,
  navOn: false,                     // manoeuvre courante active ?
  navDist: 0,                       // distance avant manoeuvre (m)
  navText: '',                      // instruction / rue
  navArrow: '',                     // glyphe fleche (info)
  navTurn: 0,                       // -1 gauche / +1 droite / 0 tout droit
  eta: null,
  limit: null,                      // limite si fournie
  routeCoords: null                 // [[lon,lat],...] (info)
};

// parse robuste d'une distance "<nombre>" + unite "m"|"km" -> metres
function parseDistMeters(distStr, unit){
  var n = parseFloat(distStr);
  if(!isFinite(n)) return 0;
  return (unit === 'km') ? n * 1000 : n;
}

// detecte le sens de manoeuvre depuis l'instruction / la fleche
function detectTurn(instr, arrow){
  var s = ((instr||'') + ' ' + (arrow||'')).toLowerCase();
  // fleches usuelles
  if(/[↰←⬅️◀]/.test(s) || /droite/.test(s)===false && /gauche|left/.test(s)) {
    if(/gauche|left|↰|←|⬅|◀/.test(s)) return -1;
  }
  if(/droite|right|↱|→|➡|▶/.test(s)) return 1;
  if(/gauche|left|↰|←|⬅|◀/.test(s)) return -1;
  return 0;
}

window.addEventListener('message', function(e){
  var d = e && e.data;
  if(!d || typeof d !== 'object' || !d.type) return;
  try {
    switch(d.type){
      case 'gps': {
        // vitesse REELLE en m/s -> km/h
        var ms = (typeof d.speed === 'number' && isFinite(d.speed)) ? d.speed : 0;
        LIVE.speedKmh = Math.max(0, ms * 3.6);
        if(typeof d.heading === 'number' && isFinite(d.heading)){
          LIVE.heading = ((d.heading % 360) + 360) % 360;
        }
        if(typeof d.lat === 'number') LIVE.lat = d.lat;
        if(typeof d.lon === 'number') LIVE.lon = d.lon;
        if(typeof d.acc === 'number') LIVE.acc = d.acc;
        // limite de vitesse facultative (champ 'limit' ou 'maxspeed'), sinon inchangee
        var lim = (typeof d.limit === 'number') ? d.limit
                : (typeof d.maxspeed === 'number') ? d.maxspeed : null;
        if(lim != null && isFinite(lim) && lim > 0) LIVE.limit = lim;
        LIVE.lastGps = performance.now();
        LIVE.active = true;
        // recentre la mini-carte sur la vraie position si dispo
        if(LIVE.lat != null && LIVE.lon != null && window.cockpitSetMapPos){
          window.cockpitSetMapPos(LIVE.lat, LIVE.lon);
        }
        break;
      }
      case 'nav': {
        LIVE.navOn = !!d.nav;
        if(LIVE.navOn){
          LIVE.navDist = parseDistMeters(d.dist, d.distUnit);
          LIVE.navText = (typeof d.instr === 'string' && d.instr) ? d.instr : '';
          LIVE.navArrow = (typeof d.arrow === 'string') ? d.arrow : '';
          LIVE.eta = (typeof d.eta === 'string' && d.eta) ? d.eta : null;
          if(typeof d.limit === 'number' && isFinite(d.limit) && d.limit > 0) LIVE.limit = d.limit;
          LIVE.navTurn = detectTurn(LIVE.navText, LIVE.navArrow);
        } else {
          LIVE.navDist = 0; LIVE.navText = ''; LIVE.navArrow='';
          LIVE.eta = null; LIVE.navTurn = 0;
        }
        break;
      }
      case 'route': {
        LIVE.routeCoords = Array.isArray(d.coords) ? d.coords : null;
        break;
      }
      case 'mode': {
        if(typeof d.mode === 'string') HUB3D.mode = d.mode;
        break;
      }
      case 'northlock':
      default:
        // 'northlock' a ignorer ; types inconnus ignores sans erreur
        break;
    }
  } catch(err){ /* jamais lever d'erreur cote hub */ }
}, false);

const LANE_W = 3.2;

function pathOffsetX(s){
  return Math.sin(s*0.012) * 7.0
       + Math.sin(s*0.031 + 1.3) * 3.0
       + Math.sin(s*0.0067 + 2.1) * 4.5;
}
function pathHeading(s){
  const d = 0.5;
  const dx = pathOffsetX(s+d) - pathOffsetX(s-d);
  return Math.atan2(dx, 2*d);
}
const _wp = new THREE.Vector3();
function worldAt(s, lat, out){
  out = out || _wp;
  const ox = pathOffsetX(s);
  const yaw = pathHeading(s);
  const nx = Math.cos(yaw);
  const nz = -Math.sin(yaw);
  out.set(ox + nx*lat, 0, -s + nz*lat);
  return out;
}

function makeRoadTexture(){
  const c=document.createElement('canvas'); c.width=256; c.height=1024;
  const x=c.getContext('2d');
  // asphalte gris MOYEN (jour)
  x.fillStyle='#6f7378'; x.fillRect(0,0,256,1024);
  for(let i=0;i<2600;i++){
    const g=96+Math.random()*36;
    x.fillStyle='rgba('+g+','+(g+2)+','+(g+6)+',0.45)';
    x.fillRect(Math.random()*256, Math.random()*1024, 1.4, 1.4);
  }
  // marquages blancs bien lumineux
  x.fillStyle='#ffffff';
  x.fillRect(6,0,5,1024); x.fillRect(245,0,5,1024);
  const sepX=[256*0.25, 256*0.5, 256*0.75];
  x.fillStyle='#ffffff';
  const dash=90, gap=110;
  for(const sx of sepX){
    for(let y=0;y<1024;y+=dash+gap){ x.fillRect(sx-2.5, y, 5, dash); }
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.repeat.set(1, ROAD_SEGMENTS*ROAD_SPAN/16);
  t.anisotropy = renderer.capabilities.getMaxAnisotropy();
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const roadTex = makeRoadTexture();

function buildStripGeometry(segs){
  const geo = new THREE.BufferGeometry();
  const verts = (segs+1)*2;
  const pos = new Float32Array(verts*3);
  const uv  = new Float32Array(verts*2);
  const idx = [];
  for(let i=0;i<segs;i++){
    const a=i*2, b=i*2+1, cI=(i+1)*2, d=(i+1)*2+1;
    idx.push(a,b,cI, b,d,cI);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uv,2));
  geo.setIndex(idx);
  geo.setAttribute('normal', new THREE.BufferAttribute(new Float32Array(verts*3),3));
  const nrm = geo.attributes.normal.array;
  for(let i=0;i<verts;i++){ nrm[i*3+1]=1; }
  return geo;
}

function updateStrip(geo, halfWidth, yLift){
  const pos = geo.attributes.position.array;
  const uv  = geo.attributes.uv.array;
  const s0 = sBase - ROAD_BACK;
  for(let i=0;i<=ROAD_SEGMENTS;i++){
    const s = s0 + i*ROAD_SPAN;
    const yaw = pathHeading(s);
    const nx = Math.cos(yaw), nz = -Math.sin(yaw);
    const ox = pathOffsetX(s);
    const zc = -s;
    const aL = i*2, aR = i*2+1;
    pos[aL*3]   = ox - nx*halfWidth; pos[aL*3+1]=yLift; pos[aL*3+2]= zc - nz*halfWidth;
    pos[aR*3]   = ox + nx*halfWidth; pos[aR*3+1]=yLift; pos[aR*3+2]= zc + nz*halfWidth;
    const vY = s*0.0625;
    uv[aL*2]=0; uv[aL*2+1]=vY;
    uv[aR*2]=1; uv[aR*2+1]=vY;
  }
  geo.attributes.position.needsUpdate = true;
  geo.attributes.uv.needsUpdate = true;
  geo.computeBoundingSphere();
}

function makeRibbonTexture(){
  const c=document.createElement('canvas'); c.width=64; c.height=256;
  const x=c.getContext('2d');
  x.clearRect(0,0,64,256);
  for(let y=0;y<256;y+=64){
    const grad=x.createLinearGradient(0,y,0,y+48);
    grad.addColorStop(0,'rgba(120,180,255,0.0)');
    grad.addColorStop(0.5,'rgba(120,190,255,0.95)');
    grad.addColorStop(1,'rgba(120,180,255,0.0)');
    x.fillStyle=grad;
    x.beginPath();
    x.moveTo(6,y+48); x.lineTo(32,y+8); x.lineTo(58,y+48);
    x.lineTo(58,y+56); x.lineTo(32,y+18); x.lineTo(6,y+56);
    x.closePath(); x.fill();
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.repeat.set(1,18);
  t.colorSpace=THREE.SRGBColorSpace;
  return t;
}

// NB: surtout PAS de vertexColors:true ici. La couleur par batiment passe par
// instanceColor (mecanisme dedie d'InstancedMesh). Avec vertexColors:true, le

const bldData = [];
for(let i=0;i<BLD_COUNT;i++){
  const side = i < BLD_PER_SIDE ? -1 : 1;
  const k = i % BLD_PER_SIDE;
  bldData.push({
    side,

}

const _m = new THREE.Matrix4();
const _q = new THREE.Quaternion();
const _e = new THREE.Euler();
const _scl = new THREE.Vector3();
const _pos = new THREE.Vector3();
function updateBuildings(){
  const period = BLD_PER_SIDE * BLD_SPAN;
  for(let i=0;i<BLD_COUNT;i++){
    const b = bldData[i];
    let s = b.sIndex*BLD_SPAN + (b.side<0 ? 0 : BLD_SPAN*0.5);
    const anchor = Math.floor((sBase - 20) / period) * period;
    s += anchor;
    if(s < sBase - 30) s += period;
    const yaw = pathHeading(s);
    worldAt(s, b.side * BLD_SETBACK + b.side*(b.w*0.5), _pos);
    _pos.y = 0;
    _scl.set(b.w, b.h, b.d);
    _e.set(0, yaw, 0);
    _q.setFromEuler(_e);
    _m.compose(_pos, _q, _scl);
    buildings.setMatrixAt(i, _m);
  }
  buildings.instanceMatrix.needsUpdate = true;
  buildings.computeBoundingSphere();
}

  const period = (LAMP_COUNT/2) * LAMP_SPAN;
  for(let i=0;i<LAMP_COUNT;i++){
    const side = (i%2===0)?-1:1;
    const k = (i/2)|0;
    let s = k*LAMP_SPAN;
    const anchor = Math.floor((sBase - 10)/period)*period;
    s += anchor;

const camPos      = new THREE.Vector3(0, 4.4, 10);

function spring(cur, vel, target, dt, stiffness, damping){
  const ax = -stiffness*(cur.x-target.x) - damping*vel.x;
  const ay = -stiffness*(cur.y-target.y) - damping*vel.y;
  const az = -stiffness*(cur.z-target.z) - damping*vel.z;
  vel.x += ax*dt; vel.y += ay*dt; vel.z += az*dt;
  cur.x += vel.x*dt; cur.y += vel.y*dt; cur.z += vel.z*dt;
}

function updateChaseCamera(dt){
  const vN = Math.min(egoSpeed / 42, 1);
  const back = 9.0 + vN*3.2;
  const high = 4.6 - vN*0.9;

  worldAt(sBase - back, egoLane*0.6, _desiredCam);
  _desiredCam.y = high;

  const aheadDist = 10 + vN*10;
  worldAt(sBase + aheadDist, egoLane, _desiredLook);
  _desiredLook.y = 1.1 + vN*0.4;

  let rem = dt;
  const h = 1/120;
  const KP = 60, DP = 14;
  const KL = 45, DL = 12;
  while(rem > 0){
    const step = Math.min(h, rem);
    spring(camPos, camVel, _desiredCam, step, KP, DP);
    spring(lookPos, lookVel, _desiredLook, step, KL, DL);
    rem -= step;
  }
  camera.position.copy(camPos);
  camera.up.copy(_up);
  camera.lookAt(lookPos);
  const yaw = pathHeading(sBase);
  camera.rotation.z += (-yaw*0.18 - camera.rotation.z) * (1 - Math.exp(-4*dt));
}

/* ============ Sim conduite ============ */
let egoSpeed = 26;
let targetSpeed = 26;
let t = 0;

const hudSpd = document.querySelector('#hud .spd');

function updateEgo(dt){
  const live = liveFresh();

  if(live){
    // === MODE LIVE : vitesse pilotee par le GPS reel (km/h -> m/s) ===
    targetSpeed = LIVE.speedKmh / 3.6;
    egoSpeed += (targetSpeed - egoSpeed) * (1 - Math.exp(-3.0*dt));
  } else {
    // === MODE DEMO : comportement simule inchange ===
    targetSpeed = 24 + Math.sin(t*0.13)*8 + Math.sin(t*0.41+1.0)*3;
    egoSpeed += (targetSpeed - egoSpeed) * (1 - Math.exp(-1.5*dt));
  }

  sBase += egoSpeed * dt;

  // voie cible : en DEMO, ondulation auto. En LIVE, on reste centre, mais on
  // incurve doucement la trajectoire vers la manoeuvre proche (nice-to-have).
  let laneTarget;
  if(live){
    laneTarget = LANES[1];
    // alignement doux : si manoeuvre a gauche/droite et distance faible,
    // on biaise legerement la voie ego dans le sens du virage.
    if(LIVE.navOn && LIVE.navTurn !== 0 && LIVE.navDist > 0 && LIVE.navDist < 80){
      const prox = 1 - (LIVE.navDist / 80);        // 0 loin -> 1 proche
      laneTarget = LANES[1] + LIVE.navTurn * prox * (LANE_W*0.9);
    }
  } else {
    laneTarget = LANES[1] + Math.sin(t*0.32) * (LANE_W*1.25);
  }
  egoLane += (laneTarget - egoLane) * (1 - Math.exp(-2.2*dt));

  worldAt(sBase, egoLane, _egoPos);
  ego.position.copy(_egoPos);
  const drift = Math.cos(t*0.32) * 0.06;
  ego.rotation.y = pathHeading(sBase) - drift;
}

function updateScroll(dt){
  roadTex.offset.y   -= egoSpeed * dt * 0.0021; roadTex.offset.y %= 1;
  ribbonScroll       += egoSpeed * dt * 0.012;
}

/* ============ MAJ de l'etat global expose ============
   On alimente HUB3D au format attendu par le cockpit :
   gear = nombre (0 = N), rpm = tr/min reels, heading = deg.
   ================================================== */
const RPM_IDLE = 850, RPM_SPAN = 6100; // tr/min : ralenti + plage utile
function updateState(){
  const live = liveFresh();
  HUB3D.live = live;

  // vitesse : en LIVE = vraie valeur GPS ; en DEMO = vitesse simulee.
  const kmh = live ? LIVE.speedKmh : (egoSpeed * 3.6);
  HUB3D.speedKmh = Math.round(kmh);

  // rapport derive de la vitesse (nombre pour le cockpit + libelle conserve)
  let g, label;
  if(kmh < 30){ g = 2; label = '2'; }
  else if(kmh < 60){ g = 3; label = '3'; }
  else if(kmh < 90){ g = 4; label = '4'; }
  else { g = 5; label = 'D'; }
  HUB3D.gear = g;
  HUB3D.gearLabel = label;

  // regime : normalise 0..1 (compat) + tr/min reels pour le shift-light
  const norm = Math.min(1, egoSpeed/42) * 0.65 + 0.15;
  HUB3D.rpmNorm = norm;
  HUB3D.rpm = Math.round(RPM_IDLE + norm * RPM_SPAN);

  if(live){
    // === LIVE : cap reel + limite si fournie + manoeuvre reelle ===
    HUB3D.heading = LIVE.heading;
    HUB3D.limit = (LIVE.limit != null) ? LIVE.limit : null;
    HUB3D.eta = LIVE.eta;

    if(LIVE.navOn){
      HUB3D.navDist = Math.max(0, LIVE.navDist);
      HUB3D.navText = LIVE.navText || 'Continuez tout droit';
      // distance restante lisible dans le panneau telemetrie
      HUB3D.remaining = HUB3D.navDist >= 1000
        ? (HUB3D.navDist/1000).toFixed(1)+' km'
        : Math.round(HUB3D.navDist)+' m';
    } else {
      // pas de manoeuvre active : on masque le bandeau (navDist negatif)
      HUB3D.navDist = -1;
      HUB3D.navText = '';
      HUB3D.remaining = null;
    }
  } else {
    // === DEMO : valeurs simulees (comportement d'origine inchange) ===
    HUB3D.limit = 90;
    HUB3D.heading = (THREE.MathUtils.radToDeg(pathHeading(sBase)) % 360 + 360) % 360;
    HUB3D.eta = null;
    HUB3D.remaining = null;

    // prochaine manoeuvre : ou la spline tourne le plus fort devant
    let bestS = sBase+40, bestK = 0;
    for(let s=sBase+20; s<sBase+160; s+=20){
      const k = Math.abs(pathHeading(s+10) - pathHeading(s-10));
      if(k > bestK){ bestK = k; bestS = s; }
    }
    HUB3D.navDist = Math.max(0, Math.round((bestS - sBase)/5)*5);
    const dir = (pathOffsetX(bestS+10) - pathOffsetX(bestS-10));
    HUB3D.navText = bestK < 0.02 ? 'Continuez tout droit'
                  : (dir > 0 ? 'Courbe a droite' : 'Courbe a gauche');
  }
}

/* ============ Resize responsive ============ */
addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  // PAS de setPixelRatio ici (bug viewport iOS)
});

/* ============ Boucle ============ */
const clock = new THREE.Clock();

worldAt(sBase - 9, 0, camPos); camPos.y = 4.6;
worldAt(sBase + 12, 0, lookPos); lookPos.y = 1.2;

(function tick(){
  let dt = clock.getDelta();
  if(dt > 0.05) dt = 0.05;
  t += dt;

  updateEgo(dt);
  updateScroll(dt);

  updateStrip(roadGeo, ROAD_W/2, 0);
  updateStrip(groundGeo, 200, -0.02);
  updateRibbon();

  updateTraffic(dt);
  updateBuildings();
  updateLamps();

  ribbon.material.opacity = 0.72 + Math.sin(t*3)*0.12;

  for(let i=0;i<movingLights.length;i++){
    const s = sBase + i*LAMP_SPAN + 10;
    const side = (i%2===0)?-1:1;
    worldAt(s, side*(ROAD_W/2), _pos); _pos.y = 5.7;
    movingLights[i].position.copy(_pos);
  }

  moon.position.set(ego.position.x-10, 24, ego.position.z+8);
  moon.target.position.set(ego.position.x, 0, ego.position.z-12);

  updateChaseCamera(dt);
  // recale le ciel sur la camera (cf. bug sphere hors far-plane)
  if(window.__sky) window.__sky.position.copy(camera.position);
  updateState();

  hudSpd.textContent = HUB3D.speedKmh;

  // === BRANCHEMENT COCKPIT : repeint l'overlay DOM a chaque frame ===
  if(window.updateCockpit) window.updateCockpit();

  renderer.render(scene, camera);
  requestAnimationFrame(tick);
})();
</script>

<!-- Leaflet JS (overlay mini-carte) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
"use strict";
/* ===================== PRACTICE COCKPIT OVERLAY — LOGIC ===================== */
(function(){
  var $ = function(id){ return document.getElementById(id); };

  /* HUB3D est deja cree par le module Three.js (qui tourne en premier).
     On ne fait que completer les cles manquantes sans ecraser l'existant. */
  window.HUB3D = window.HUB3D || {};
  var d = {
    speedKmh:0, gear:0, rpm:0, navDist:null, navText:'',
    limit:50, heading:null, eta:null, remaining:null, live:false
  };
  for(var k in d){ if(!(k in window.HUB3D)) window.HUB3D[k] = d[k]; }

  /* ---- constants ---- */
  var DEMO_POS = [48.8566, 2.3522];
  var RPM_MAX  = 8000, RPM_REDLINE = 6800, SHIFT_SEGS = 10;
  var COMPASS  = ['N','NE','E','SE','S','SO','O','NO'];

  var opt = { map:true, night:false, sound:true, north:false };

  /* ============ MINI-MAP (Leaflet, demo position) ============ */
  var map=null, meMarker=null;
  function initMap(){
    if(map || !$('ck-miniMap')) return;
    if(typeof L === 'undefined'){ showMapFallback(); return; }
    try{
      map = L.map('ck-miniMap', {
        zoomControl:false, attributionControl:false, dragging:false,
        scrollWheelZoom:false, doubleClickZoom:false, touchZoom:false, keyboard:false
      }).setView(DEMO_POS, 15);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom:19, crossOrigin:true
      }).addTo(map);
      var icon = L.divIcon({className:'', html:'<div class="ck-me-dot"></div>', iconSize:[14,14], iconAnchor:[7,7]});
      meMarker = L.marker(DEMO_POS, {icon:icon}).addTo(map);
      var fb=$('ck-mapFallback'); if(fb) fb.style.display='none';
      setTimeout(function(){ try{ map.invalidateSize(); }catch(e){} }, 200);
    }catch(e){ showMapFallback(); }
  }
  function showMapFallback(){ var fb=$('ck-mapFallback'); if(fb) fb.style.display='grid'; }
  window.cockpitSetMapPos = function(lat,lon){
    if(!map||!meMarker) return;
    meMarker.setLatLng([lat,lon]); map.setView([lat,lon], map.getZoom(), {animate:false});
  };

  /* ============ SHIFT-LIGHT SEGMENTS ============ */
  (function buildShift(){
    var c=$('ck-shift'); if(!c) return;
    for(var i=0;i<SHIFT_SEGS;i++){ var s=document.createElement('span'); s.className='rh-seg'; c.appendChild(s); }
  })();
  function paintShift(rpm){
    var c=$('ck-shift'); if(!c) return;
    var frac=Math.max(0,Math.min(1,rpm/RPM_MAX)), lit=Math.round(frac*SHIFT_SEGS);
    var redline = rpm>=RPM_REDLINE;
    var segs=c.children;
    for(var i=0;i<segs.length;i++){
      var on=i<lit, cls='rh-seg';
      if(on){
        var col = i<5?'g' : i<8?'y' : 'r';
        cls += ' on '+col;
        if(redline) cls += ' bl';
      }
      if(segs[i].className!==cls) segs[i].className=cls;
    }
  }

  /* ============ updateCockpit() — call every frame ============ */
  var _last={};
  function setTxt(id,val){ if(_last[id]===val) return; var el=$(id); if(el){ el.textContent=val; _last[id]=val; } }

  function updateCockpit(){
    var s = window.HUB3D || {};

    setTxt('ck-spd', Math.round(s.speedKmh||0));

    var g = s.gear|0;
    setTxt('ck-gear', g===0 ? 'N' : String(g));
    var rpm = Math.max(0, s.rpm||0);
    setTxt('ck-rpm', String(Math.round(rpm)));
    paintShift(rpm);

    if(typeof s.heading==='number'){
      var idx=Math.round(((s.heading%360)+360)%360 / 45) % 8;
      setTxt('ck-hdg', COMPASS[idx]);
    }

    if(s.remaining!=null || s.eta!=null){
      setTxt('ck-route', [s.remaining, s.eta].filter(Boolean).join(' · ') || '—');
    }

    if(s.limit!=null) setTxt('ck-lim', String(s.limit));

    setTxt('ck-eta', s.eta!=null ? s.eta : '—');
    setTxt('ck-rem', s.remaining!=null ? s.remaining : 'restant');

    var nm=$('ck-navMan');
    if(typeof s.navDist==='number' && s.navDist>=0){
      var dd = s.navDist>=1000 ? (s.navDist/1000).toFixed(1)+' km' : Math.round(s.navDist)+' m';
      setTxt('ck-nmDist', dd);
      setTxt('ck-nmRoad', s.navText || '—');
      if(nm) nm.classList.add('show');
    } else if(nm){ nm.classList.remove('show'); }

    var lvl='SAFE';
    if(s.limit && s.speedKmh){
      if(s.speedKmh > s.limit*1.20) lvl='CRITICAL';
      else if(s.speedKmh > s.limit)  lvl='ALERT';
    }
    var ck=$('cockpit');
    if(ck && ck.getAttribute('data-lvl')!==lvl) ck.setAttribute('data-lvl',lvl);
    setTxt('ck-stateTxt', lvl);
    var dot=$('ck-stateDot');
    if(dot){ var cc = lvl==='CRITICAL'?'var(--crit)':lvl==='ALERT'?'var(--alert)':'var(--safe)';
      if(dot.style.color!==cc){ dot.style.color=cc; dot.style.background=cc; } }

    var lb=$('ck-live');
    if(lb){ var want=s.live?'live':'demo';
      if(!lb.classList.contains(want)){ lb.className=want; lb.textContent=s.live?'LIVE':'DÉMO'; } }
  }
  window.updateCockpit = updateCockpit;

  /* ============ BURGER "Paramètres" drawer ============ */
  $('ck-burger').addEventListener('click', function(e){
    e.stopPropagation();
    var c=$('ck-ctl'); c.classList.toggle('open');
    this.classList.toggle('on', c.classList.contains('open'));
  });
  document.addEventListener('click', function(e){
    var c=$('ck-ctl'), b=$('ck-burger');
    if(c.classList.contains('open') && !c.contains(e.target) && e.target!==b && !b.contains(e.target)){
      c.classList.remove('open'); b.classList.remove('on');
    }
  });

  function toggleBtn(btn, key, onLabel, offLabel){
    opt[key]=!opt[key];
    btn.classList.toggle('on', opt[key]);
    if(onLabel) btn.textContent = opt[key]?onLabel:offLabel;
  }
  $('ck-bMap').addEventListener('click', function(){
    toggleBtn(this,'map');
    $('cockpit').setAttribute('data-map', opt.map?'on':'off');
    if(opt.map){ initMap(); setTimeout(function(){ try{map&&map.invalidateSize();}catch(e){} },120); }
  });
  $('ck-bNight').addEventListener('click', function(){
    toggleBtn(this,'night'); window.dispatchEvent(new CustomEvent('cockpit:night',{detail:opt.night}));
  });
  $('ck-bSound').addEventListener('click', function(){
    toggleBtn(this,'sound','🔊 Son','🔇 Muet');
    window.dispatchEvent(new CustomEvent('cockpit:sound',{detail:opt.sound}));
  });
  $('ck-bNorth').addEventListener('click', function(){
    toggleBtn(this,'north','🧭 Nord verrouillé','🧭 Nord libre');
    window.dispatchEvent(new CustomEvent('cockpit:north',{detail:opt.north}));
  });
  $('ck-bView').addEventListener('click', function(){
    this.classList.toggle('on');
    window.dispatchEvent(new CustomEvent('cockpit:view',{detail:this.classList.contains('on')}));
  });
  $('ck-bFull').addEventListener('click', function(){
    var el=document.documentElement, btn=this;
    try{
      var req = el.requestFullscreen || el.webkitRequestFullscreen;
      var exit = document.exitFullscreen || document.webkitExitFullscreen;
      var isFull = document.fullscreenElement || document.webkitFullscreenElement;
      if(!isFull){ if(req){ req.call(el); btn.classList.add('on'); } }
      else { if(exit){ exit.call(document); } btn.classList.remove('on'); }
    }catch(e){}
  });

  /* ============ INIT ============ */
  function boot(){
    $('cockpit').setAttribute('data-lvl','SAFE');
    $('cockpit').setAttribute('data-map','on');
    initMap();
    updateCockpit();
    /* filet de securite : si la boucle Three.js appelle deja updateCockpit()
       chaque frame, cet intervalle est inoffensif (repeint les memes valeurs). */
    setInterval(updateCockpit, 200);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
/* =================== /PRACTICE COCKPIT OVERLAY — LOGIC ==================== */
</script>
